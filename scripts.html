    const marker = new THREE.Mesh(markerGeom, markerMat);
    marker.position.copy(point);
    marker.renderOrder = 999;  // draw on top
    viewerState.scene.add(marker);
    measureState.markers.push(marker);
    measureState.points.push(point.clone());

    // When we have two points, draw the line + distance label.
    if (measureState.points.length === 2) {
      const [a, b] = measureState.points;
      const lineGeom = new THREE.BufferGeometry().setFromPoints([a, b]);
      const lineMat = new THREE.LineBasicMaterial({ color: 0xED6C30, depthTest: false });
      const line = new THREE.Line(lineGeom, lineMat);
      line.renderOrder = 998;
      viewerState.scene.add(line);
      measureState.line = line;

      const dist = a.distanceTo(b);
      const label = document.getElementById('viewer-measure-label');
      if (label) {
        label.textContent = dist.toFixed(2) + ' mm';
        label.hidden = false;
      }

      // Exit measure mode automatically — clicking again starts a fresh pair.
      measureState.active = false;
      const btn = document.getElementById('viewer-measure-btn');
      const canvas = document.getElementById('step-viewer-canvas');
      const hint = document.getElementById('viewer-measure-hint');
      if (btn) btn.classList.remove('active');
      if (canvas) canvas.classList.remove('measuring');
      if (hint) hint.hidden = true;
    }
  }

  // Project the measure label's 3D position (midpoint of the two points) to
  // 2D so it follows the points as the camera orbits. Called every frame
  // from the animation loop when a measurement exists.
  function updateMeasureLabelPosition() {
    if (!viewerState || measureState.points.length !== 2) return;
    const label = document.getElementById('viewer-measure-label');
    const canvas = document.getElementById('step-viewer-canvas');
    if (!label || !canvas || label.hidden) return;
    const mid = measureState.points[0].clone().lerp(measureState.points[1], 0.5);
    const projected = mid.clone().project(viewerState.camera);
    // Clip if behind camera
    if (projected.z > 1) { label.style.opacity = '0'; return; }
    label.style.opacity = '1';
    const rect = canvas.getBoundingClientRect();
    const x = ((projected.x + 1) / 2) * rect.width;
    const y = ((-projected.y + 1) / 2) * rect.height;
    label.style.left = x + 'px';
    label.style.top  = y + 'px';
  }

  // Set up the click handler that translates a click into a surface point
  // via raycasting. Wired once when the viewer is first initialized.
  function attachViewerClickHandler() {
    const THREE = window.THREE;
    if (!viewerState || measureState.clickHandler) return;
    measureState.raycaster = new THREE.Raycaster();
    const canvas = viewerState.renderer.domElement;
    const handler = (e) => {
      if (!measureState.active) return;
      if (!viewerState.partGroup) return;
      const rect = canvas.getBoundingClientRect();
      const mouse = new THREE.Vector2(
        ((e.clientX - rect.left) / rect.width) * 2 - 1,
        -((e.clientY - rect.top) / rect.height) * 2 + 1
      );
      measureState.raycaster.setFromCamera(mouse, viewerState.camera);
      const hits = measureState.raycaster.intersectObjects(viewerState.partGroup.children, true);
      if (hits.length > 0) placeMeasurePoint(hits[0].point);
    };
    canvas.addEventListener('click', handler);
    measureState.clickHandler = handler;
  }

  // Populate the bbox overlay with X/Y/Z dimensions from the parsed geometry.
  // Called from showStepIn3DViewer once a part loads.
  function updateBboxOverlay(bbox) {
    const el = document.getElementById('viewer-bbox-overlay');
    if (!el) return;
    el.innerHTML =
      '<span class="axis-label">X</span>' + bbox.x.toFixed(1) + ' mm &nbsp;·&nbsp; ' +
      '<span class="axis-label">Y</span>' + bbox.y.toFixed(1) + ' mm &nbsp;·&nbsp; ' +
      '<span class="axis-label">Z</span>' + bbox.z.toFixed(1) + ' mm';
    el.hidden = false;
  }

  // Wrapper called from processStepFile after a successful parse.
  async function showStepIn3DViewer(meshes, geom) {
    const panel = document.getElementById('step-viewer');
    const canvas = document.getElementById('step-viewer-canvas');
    if (!panel || !canvas) return;
    panel.hidden = false;
    try {
      await loadThree();
    } catch (err) {
      panel.hidden = true;
      console.warn('3D viewer disabled:', err.message);
      return;
    }
    if (!viewerState) init3DViewer(canvas);
    display3DPart(meshes);
    if (geom && geom.bbox) updateBboxOverlay(geom.bbox);
  }

  // Compute volume, surface area, bounding box, and projected areas from the
  // tessellated meshes returned by occt-import-js. Returns both signed and
  // unsigned volume so the caller can detect winding inconsistencies. Also
  // counts triangles for diagnostic purposes.
  //
  // Math (verified on synthetic unit cube — see .claude/test_step_geom.js):
  //   - Volume:  V = |Σ (v0 · (v1 × v2)) / 6|       (Mirtich 1996; gives the
  //              enclosed volume for a closed mesh with consistent winding)
  //   - Area:    A = Σ |cross(v1-v0, v2-v0)| / 2    (standard triangle area)
  //   - BBox:    [min..max] across all vertices, per axis
  //   - Nominal wall:        2V/A      (Rosato; the "average thickness" for a
  //                                     thin-walled hollow part)
  //   - Bbox face areas:     X·Y, X·Z, Y·Z   (the three bbox silhouettes)
  //   - Face-projected:      Σ |n_axis| / 4   (silhouette via summing
  //                                            triangle-normal components,
  //                                            accounts for through-holes)
  function computeGeometryFromMeshes(meshes) {
    let signedVolMM3 = 0;
    let areaMM2 = 0;
    let projAccumX = 0, projAccumY = 0, projAccumZ = 0;
    let minX = Infinity, maxX = -Infinity;
    let minY = Infinity, maxY = -Infinity;
    let minZ = Infinity, maxZ = -Infinity;
    let triCount = 0;
    let vertCount = 0;
    let meshCount = 0;

    for (const mesh of meshes) {
      const verts = mesh.attributes && mesh.attributes.position && mesh.attributes.position.array;
      const idx = mesh.index && mesh.index.array;
      if (!verts || !idx || verts.length === 0 || idx.length === 0) continue;
      meshCount++;
      vertCount += verts.length / 3;

      // Bounding box from vertices
      for (let i = 0; i < verts.length; i += 3) {
        const x = verts[i], y = verts[i + 1], z = verts[i + 2];
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
        if (z < minZ) minZ = z; if (z > maxZ) maxZ = z;
      }

      // Per-triangle accumulators
      for (let t = 0; t + 2 < idx.length; t += 3) {
        const ia = idx[t] * 3, ib = idx[t + 1] * 3, ic = idx[t + 2] * 3;
        const ax = verts[ia], ay = verts[ia + 1], az = verts[ia + 2];
        const bx = verts[ib], by = verts[ib + 1], bz = verts[ib + 2];
        const cx = verts[ic], cy = verts[ic + 1], cz = verts[ic + 2];
        triCount++;

        // Signed tetrahedron volume from origin. For a closed mesh with
        // outward-facing triangles, the sum is +V. With inward-facing it's
        // -V. With mixed winding it's some number between -V and V — we
        // detect this via |sum|/sum_abs ratio (sanity check below).
        signedVolMM3 += (ax * (by * cz - bz * cy)
                       + ay * (bz * cx - bx * cz)
                       + az * (bx * cy - by * cx)) / 6;

        // Edge vectors AB and AC, cross product = 2 × triangle normal
        const e1x = bx - ax, e1y = by - ay, e1z = bz - az;
        const e2x = cx - ax, e2y = cy - ay, e2z = cz - az;
        const nx = e1y * e2z - e1z * e2y;
        const ny = e1z * e2x - e1x * e2z;
        const nz = e1x * e2y - e1y * e2x;
        const nLen = Math.sqrt(nx * nx + ny * ny + nz * nz);
        areaMM2 += nLen / 2;

        projAccumX += Math.abs(nx);
        projAccumY += Math.abs(ny);
        projAccumZ += Math.abs(nz);
      }
    }

    const volMM3 = Math.abs(signedVolMM3);
    // Face-projected silhouette via Σ|cross_axis|/4 across triangles. For
    // closed meshes this gives the TRUE silhouette area accounting for
    // through-holes and hollow interiors — the actual plastic cross-section
    // on the parting plane, not the bbox face.
    const faceXY_cm2 = projAccumZ / 4 / 100;
    const faceXZ_cm2 = projAccumY / 4 / 100;
    const faceYZ_cm2 = projAccumX / 4 / 100;
    const faceMaxCm2 = Math.max(faceXY_cm2, faceXZ_cm2, faceYZ_cm2);
    // Bbox face areas — kept for diagnostic comparison only. NOT used for
    // tonnage because for hollow parts (lids, shells, frames) the bbox face
    // is 2-5× larger than the actual plastic silhouette.
    const bbox_x = maxX - minX, bbox_y = maxY - minY, bbox_z = maxZ - minZ;
    const bboxXY_cm2 = (bbox_x * bbox_y) / 100;
    const bboxXZ_cm2 = (bbox_x * bbox_z) / 100;
    const bboxYZ_cm2 = (bbox_y * bbox_z) / 100;
    const bboxMaxCm2 = Math.max(bboxXY_cm2, bboxXZ_cm2, bboxYZ_cm2);
    const bboxVolMM3 = bbox_x * bbox_y * bbox_z;
    const nominalWallMm = areaMM2 > 0 ? (2 * volMM3 / areaMM2) : 0;
    const hollowness = bboxVolMM3 > 0 ? (volMM3 / bboxVolMM3) : 0;

    return {
      meshCount,
      triCount,
      vertCount,
      volume_mm3: volMM3,
      signed_volume_mm3: signedVolMM3,
      area_mm2: areaMM2,
      bbox: { x: bbox_x, y: bbox_y, z: bbox_z, volume_mm3: bboxVolMM3 },
      hollowness: hollowness,
      // Face-projected silhouette (accounts for holes) — drives tonnage.
      projected_cm2: faceMaxCm2,
      _projected_detail: {
        bbox: { XY: bboxXY_cm2, XZ: bboxXZ_cm2, YZ: bboxYZ_cm2, max: bboxMaxCm2 },
        face: { XY: faceXY_cm2, XZ: faceXZ_cm2, YZ: faceYZ_cm2, max: faceMaxCm2 }
      },
      nominal_wall_mm: nominalWallMm
    };
  }

  // Validate parsed geometry against common failure modes. Returns null if
  // everything looks OK; otherwise returns a human-readable error string.
  // Note: detecting mixed-winding from |signed|/|abs| is impossible by
  // construction (volume_mm3 = abs(signed_volume_mm3) so the ratio is always
  // 1.0). occt-import-js produces consistent winding for valid BREPs, so we
  // trust the tessellation and check observable failures only.
  function validateGeometry(geom) {
    if (geom.meshCount === 0)  return 'no mesh data in the STEP (file may be 2D drawing or empty)';
    if (geom.triCount === 0)   return 'mesh contained no triangles — STEP may have BREP errors';
    if (geom.volume_mm3 <= 0)  return 'computed volume is zero — STEP may be open shells, not a closed solid';
    if (geom.area_mm2 <= 0)    return 'computed surface area is zero — mesh is degenerate';
    if (geom.bbox.x <= 0 || geom.bbox.y <= 0 || geom.bbox.z <= 0) {
      return 'bounding box has zero dimension on at least one axis (' +
             geom.bbox.x.toFixed(2) + ' × ' + geom.bbox.y.toFixed(2) + ' × ' + geom.bbox.z.toFixed(2) + ' mm)';
    }
    // Hollowness ratio = volume / bbox_volume. Must be in [0, 1] — exceeding
    // 1 indicates overlapping geometry or self-intersection.
    if (geom.hollowness > 1.01) {
      return 'computed volume exceeds bounding-box volume (impossible) — STEP may have overlapping or self-intersecting geometry';
    }
    // Unit sanity: typical injection-molded parts are 5-500 mm. Off-by-25.4×
    // suggests a STEP exported in inches.
    const maxDim = Math.max(geom.bbox.x, geom.bbox.y, geom.bbox.z);
    if (maxDim < 1)     return 'bounding box is suspiciously small (' + maxDim.toFixed(3) + ' mm longest axis) — STEP may be in non-mm units';
    if (maxDim > 10000) return 'bounding box is suspiciously large (' + (maxDim / 1000).toFixed(1) + ' m longest axis) — STEP may be in non-mm units';
    return null;
  }

  // Build a payload from STEP geometry ONLY. Returns purely drawing-derived
  // values — volume (cm³), nominal wall thickness (mm), and projected area
  // (cm², the largest bbox face — the realistic clamp area). Nothing
  // material-dependent (no mass, no resin), nothing business-dependent (no
  // region, no annual volume), and no filename guesses for part number/name.
  function buildPayloadFromStepGeometry(geom) {
    return {
      partVolumeCm3: Math.round((geom.volume_mm3 / 1000) * 100) / 100,
      wallThicknessMm: Math.round(geom.nominal_wall_mm * 100) / 100,
      projectedAreaCm2: Math.round(geom.projected_cm2 * 10) / 10
    };
  }

  function setImportStatus(msg, kind) {
    const el = document.getElementById('import-status');
    if (!el) return;
    if (!msg) { el.hidden = true; el.textContent = ''; return; }
    el.hidden = false;
    el.className = 'import-status' + (kind === 'error' ? ' error' : '');
    if (kind === 'progress') {
      el.innerHTML = '<span class="progress"></span>' + msg;
    } else {
      el.textContent = msg;
    }
  }

  async function processStepFile(file) {
    setImportStatus('Loading STEP parser (first time only)…', 'progress');
    let occt;
    try {
      occt = await loadOcct();
    } catch (err) {
      setImportStatus('Parser failed to load: ' + err.message, 'error');
      return;
    }

    setImportStatus('Parsing ' + file.name + '…', 'progress');
    let result;
    try {
      const buffer = new Uint8Array(await file.arrayBuffer());
      // Pass null for default params — occt-import-js uses sensible defaults
      // (linearDeflection auto-scaled to model size). Verified accurate to
      // <1% on the MSA Armature vs FreeCAD reference.
      result = occt.ReadStepFile(buffer, null);
    } catch (err) {
      setImportStatus('STEP read failed: ' + err.message, 'error');
      return;
    }
    if (!result || !result.success) {
      setImportStatus('STEP parser returned an error (file may be malformed or use unsupported entities)', 'error');
      return;
    }
    if (!result.meshes || result.meshes.length === 0) {
      setImportStatus('STEP contained no tessellated geometry — likely a 2D drawing or wireframe-only file', 'error');
      return;
    }

    setImportStatus('Computing geometry…', 'progress');
    let geom;
    try {
      geom = computeGeometryFromMeshes(result.meshes);
    } catch (err) {
      setImportStatus('Geometry computation failed: ' + err.message, 'error');
      return;
    }
    const validationError = validateGeometry(geom);
    if (validationError) {
      setImportStatus('Parse validation failed: ' + validationError, 'error');
      return;
    }

    const payload = buildPayloadFromStepGeometry(geom);
    applyImportedPayload(payload);
    // Fire-and-forget 3D preview — doesn't block the import status display.
    showStepIn3DViewer(result.meshes, geom);
    // Compact, cross-checkable summary. Shows BOTH bbox-max and face-projected
    // so the user can see why we chose face-projected (real silhouette) for
    // tonnage instead of the over-counted bbox face for hollow parts.
    const bb = geom.bbox;
    const d = geom._projected_detail;
    const hollowPct = (geom.hollowness * 100).toFixed(1);
    let complexity;
    if (geom.hollowness > 0.50)      complexity = 'SOLID';
    else if (geom.hollowness > 0.20) complexity = 'STANDARD';
    else if (geom.hollowness > 0.05) complexity = 'COMPLEX (ribbed/structural)';
    else                             complexity = 'HOLLOW SHELL (lid/enclosure)';
    setImportStatus(
      'Parsed ' + file.name + ' — verify against your CAD:\n' +
      '• Bounding box: ' + bb.x.toFixed(1) + ' × ' + bb.y.toFixed(1) + ' × ' + bb.z.toFixed(1) + ' mm\n' +
      '• Volume: ' + payload.partVolumeCm3 + ' cm³ (' + geom.volume_mm3.toFixed(0) + ' mm³)\n' +
      '• Surface area: ' + geom.area_mm2.toFixed(0) + ' mm²\n' +
      '• Nominal wall (2V/A): ' + payload.wallThicknessMm + ' mm\n' +
      '• Hollowness: ' + hollowPct + '% → ' + complexity + '\n' +
      '• Projected silhouette (cm²): XY=' + d.face.XY.toFixed(0) + ', XZ=' + d.face.XZ.toFixed(0) + ', YZ=' + d.face.YZ.toFixed(0) + ' → using MAX = ' + payload.projectedAreaCm2 + '\n' +
      '   (bbox-max would be ' + d.bbox.max.toFixed(0) + ' cm² — that over-counts for hollow parts)\n' +
      '• Mesh: ' + geom.triCount.toLocaleString() + ' triangles, ' + geom.meshCount + ' ' + (geom.meshCount === 1 ? 'body' : 'bodies') + '\n' +
      'Now pick the resin & fill in region / annual volume.',
      'success'
    );
  }

  function attachImportListeners() {
    const fileEl = document.getElementById('import-file');
    if (fileEl) {
      fileEl.addEventListener('change', async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const lower = (file.name || '').toLowerCase();
        try {
          if (lower.endsWith('.step') || lower.endsWith('.stp')) {
            await processStepFile(file);
          } else {
            // .json (from FreeCAD CLI or hand-edited)
            const text = await file.text();
            const payload = JSON.parse(text);
            applyImportedPayload(payload);
            setImportStatus('Imported ' + (payload.partName || payload.partNumber || file.name), 'success');
          }
        } catch (err) {
          setImportStatus('Import failed: ' + err.message, 'error');
        } finally {
          e.target.value = '';
        }
      });
    }
    const pasteBtn = document.getElementById('import-paste-btn');
    const pasteEl = document.getElementById('import-paste');
    if (pasteBtn && pasteEl) {
      pasteBtn.addEventListener('click', () => {
        const text = pasteEl.value.trim();
        if (!text) {
          setImportStatus('Paste JSON first', 'error');
          return;
        }
        try {
          const payload = JSON.parse(text);
          applyImportedPayload(payload);
          pasteEl.value = '';
          setImportStatus('Imported pasted JSON', 'success');
        } catch (err) {
          setImportStatus('JSON parse failed: ' + err.message, 'error');
        }
      });
    }
  }

  // ============================================================================
  // Editable constants panel — renders the per-section tables and wires
  // change handlers. Each input mutates the live constant in-place, persists
  // to localStorage, and triggers recalc so the user sees the impact live.
  // ============================================================================
  function renderEditableConstants() {
    renderConstantsRegions();
    renderConstantsTonnage();
    renderConstantsResins();
    renderConstantsFillers();
    renderConstantsAuto();
  }

  // Helper: build a numeric input bound to obj[key], with edited-styling and
  // change handlers that persist + recalc. step controls the spin granularity.
  function makeConstantInput(obj, key, defaultValue, step) {
    const inp = document.createElement('input');
    inp.type = 'number';
    inp.step = step || 'any';
    inp.value = obj[key];
    inp.addEventListener('input', () => {
      const v = parseFloat(inp.value);
      if (Number.isFinite(v)) {
        obj[key] = v;
        inp.classList.toggle('edited', v !== defaultValue);
        persistUserConstants();
        recalculate();
        renderOutputs();
        updateBadges();
      }
    });
    if (obj[key] !== defaultValue) inp.classList.add('edited');
    return inp;
  }

  function renderConstantsRegions() {
    const container = document.getElementById('constants-regions');
    if (!container) return;
    container.replaceChildren();
    // Each region gets its own collapsible (USA / Mexico / China / Indonesia).
    Object.keys(REGIONS).forEach(regionName => {
      const region = REGIONS[regionName];
      const defaults = CONSTANTS_DEFAULTS.REGIONS[regionName];
      const det = document.createElement('details');
      det.style.marginBottom = '8px';
      det.style.border = '1px solid var(--grey-20)';
      det.style.borderRadius = '4px';
      det.open = (regionName === state.region);
      const summary = document.createElement('summary');
      summary.style.padding = '6px 10px';
      summary.style.cursor = 'pointer';
      summary.style.fontWeight = '600';
      summary.style.fontSize = '12px';
      summary.style.background = 'var(--grey-10)';
      summary.textContent = regionName;
      det.appendChild(summary);
      const body = document.createElement('div');
      body.style.padding = '8px 10px';

      const fields = [
        { key: 'laborRate',        label: 'Labor rate ($/hr)',           step: 0.1 },
        { key: 'ohRate',           label: 'Overhead rate (×labor)',      step: 0.01 },
        { key: 'sgaRate',          label: 'SG&A rate (×mfgCost)',        step: 0.01 },
        { key: 'marginRate',       label: 'Margin rate (×cost)',         step: 0.01 },
        { key: 'pkg',              label: 'Packaging ($/pc)',            step: 0.01 },
        { key: 'freight',          label: 'Freight ($/pc)',              step: 0.01 },
        { key: 'duty',             label: 'Duty (×supplierPrice)',       step: 0.01 },
        { key: 'multiplier',       label: 'Machine rate multiplier',     step: 0.01 },
        { key: 'resinPriceFactor', label: 'Resin price factor',          step: 0.01 },
        { key: 'operatorsPerMachine', label: 'Operators per machine',    step: 0.5 },
        { key: 'secMachineRate',   label: 'Secondary machine ($/hr)',    step: 0.5 },
        { key: 'secOpsMin',        label: 'Secondary ops fallback (min)', step: 0.05 }
      ];
      const table = document.createElement('table');
      table.className = 'constants-table';
      const tbody = document.createElement('tbody');
      fields.forEach(({ key, label, step }) => {
        const tr = document.createElement('tr');
        const tdLabel = document.createElement('td');
        tdLabel.textContent = label;
        const tdInput = document.createElement('td');
        tdInput.style.width = '120px';
        tdInput.appendChild(makeConstantInput(region, key, defaults[key], step));
        tr.append(tdLabel, tdInput);
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      body.appendChild(table);
      det.appendChild(body);
      container.appendChild(det);
    });
  }

  function renderConstantsTonnage() {
    const container = document.getElementById('constants-tonnage');
    if (!container) return;
    container.replaceChildren();
    const table = document.createElement('table');
    table.className = 'constants-table';
    const thead = document.createElement('thead');
    thead.innerHTML = '<tr><th>Bracket (≤T)</th><th>USA $/hr</th></tr>';
    table.appendChild(thead);
    const tbody = document.createElement('tbody');
    TONNAGE_BRACKETS.forEach((bracket, i) => {
      const defaults = CONSTANTS_DEFAULTS.TONNAGE_BRACKETS[i] || { baseUSA: bracket.baseUSA };
      const tr = document.createElement('tr');
      const tdLabel = document.createElement('td');
      tdLabel.textContent = bracket.maxTons >= 9999 ? '> 5000T' : '≤ ' + bracket.maxTons + 'T';
      const tdInput = document.createElement('td');
      tdInput.style.width = '120px';
      tdInput.appendChild(makeConstantInput(bracket, 'baseUSA', defaults.baseUSA, 1));
      tr.append(tdLabel, tdInput);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);
  }

  function renderConstantsResins() {
    const container = document.getElementById('constants-resins');
    if (!container) return;
    container.replaceChildren();
    const table = document.createElement('table');
    table.className = 'constants-table';
    const thead = document.createElement('thead');
    thead.innerHTML = '<tr><th>Resin</th><th>k (s/mm²)</th><th>Density (g/cm³)</th></tr>';
    table.appendChild(thead);
    const tbody = document.createElement('tbody');
    Object.keys(BASE_RESINS).forEach(resinId => {
      const resin = BASE_RESINS[resinId];
      const defaults = CONSTANTS_DEFAULTS.BASE_RESINS[resinId];
      const tr = document.createElement('tr');
      const tdLabel = document.createElement('td');
      tdLabel.textContent = resin.name;
      const tdK = document.createElement('td');
      tdK.style.width = '90px';
      tdK.appendChild(makeConstantInput(resin, 'k', defaults.k, 0.05));
      const tdDensity = document.createElement('td');
      tdDensity.style.width = '90px';
      tdDensity.appendChild(makeConstantInput(resin, 'density', defaults.density, 0.01));
      tr.append(tdLabel, tdK, tdDensity);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);
  }

  function renderConstantsFillers() {
    const container = document.getElementById('constants-fillers');
    if (!container) return;
    container.replaceChildren();
    const table = document.createElement('table');
    table.className = 'constants-table';
    const thead = document.createElement('thead');
    thead.innerHTML = '<tr><th>Filler</th><th>k bump / 10%</th><th>Density (g/cm³)</th></tr>';
    table.appendChild(thead);
    const tbody = document.createElement('tbody');
    Object.keys(FILLER_BUMPS).forEach(fillerType => {
      const filler = FILLER_BUMPS[fillerType];
      const defaults = CONSTANTS_DEFAULTS.FILLER_BUMPS[fillerType];
      const tr = document.createElement('tr');
      const tdLabel = document.createElement('td');
      tdLabel.textContent = filler.name;
      const tdBump = document.createElement('td');
      tdBump.style.width = '90px';
      tdBump.appendChild(makeConstantInput(filler, 'bumpPer10Pct', defaults.bumpPer10Pct, 0.01));
      const tdDensity = document.createElement('td');
      tdDensity.style.width = '90px';
      // FILLER_DENSITIES is a flat object — wrap a fake one for makeConstantInput
      const wrapper = { _v: FILLER_DENSITIES[fillerType] };
      const inp = document.createElement('input');
      inp.type = 'number';
      inp.step = 0.01;
      inp.value = FILLER_DENSITIES[fillerType];
      const defD = CONSTANTS_DEFAULTS.FILLER_DENSITIES[fillerType];
      if (FILLER_DENSITIES[fillerType] !== defD) inp.classList.add('edited');
      inp.addEventListener('input', () => {
        const v = parseFloat(inp.value);
        if (Number.isFinite(v)) {
          FILLER_DENSITIES[fillerType] = v;
          inp.classList.toggle('edited', v !== defD);
          persistUserConstants();
          recalculate();
          renderOutputs();
        }
      });
      tdDensity.appendChild(inp);
      tr.append(tdLabel, tdBump, tdDensity);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);
  }

  function renderConstantsAuto() {
    const container = document.getElementById('constants-auto');
    if (!container) return;
    container.replaceChildren();
    // Auto-estimate constants are simple primitives, not nested in objects.
    // Use a shared wrapper to leverage makeConstantInput's edited-styling logic.
    const wrap = {
      AUTO_TARGET_HOURS,
      AUTO_UTILIZATION,
      AUTO_COOLING_K,
      AUTO_CLAMP_T_PER_G,
      AUTO_CLAMP_T_PER_CM2,
      TONNAGE_SAFETY_FACTOR
    };
    const fields = [
      { key: 'AUTO_TARGET_HOURS',    label: 'Target production hrs/yr',           step: 100,   defKey: 'AUTO_TARGET_HOURS' },
      { key: 'AUTO_UTILIZATION',     label: 'Default machine utilization',        step: 0.01,  defKey: 'AUTO_UTILIZATION' },
      { key: 'AUTO_COOLING_K',       label: 'Fallback cooling k (s/mm²)',         step: 0.1,   defKey: 'AUTO_COOLING_K' },
      { key: 'AUTO_CLAMP_T_PER_G',   label: 'Clamp T per gram (shot-based)',      step: 0.1,   defKey: 'AUTO_CLAMP_T_PER_G' },
      { key: 'AUTO_CLAMP_T_PER_CM2', label: 'Clamp T per cm² (projected-area)',   step: 0.05,  defKey: 'AUTO_CLAMP_T_PER_CM2' },
      { key: 'TONNAGE_SAFETY_FACTOR', label: 'Tonnage safety factor',             step: 0.05,  defKey: 'TONNAGE_SAFETY_FACTOR' }
    ];
    const table = document.createElement('table');
    table.className = 'constants-table';
    const tbody = document.createElement('tbody');
    fields.forEach(({ key, label, step, defKey }) => {
      const tr = document.createElement('tr');
      const tdLabel = document.createElement('td');
      tdLabel.textContent = label;
      const tdInput = document.createElement('td');
      tdInput.style.width = '120px';
      const inp = document.createElement('input');
      inp.type = 'number';
      inp.step = step;
      inp.value = wrap[key];
      const defaultV = CONSTANTS_DEFAULTS[defKey];
      if (wrap[key] !== defaultV) inp.classList.add('edited');
      inp.addEventListener('input', () => {
        const v = parseFloat(inp.value);
        if (!Number.isFinite(v)) return;
        // Mutate the actual let-binding via switch (no other way in ES modules-less context).
        if      (key === 'AUTO_TARGET_HOURS')     AUTO_TARGET_HOURS = v;
        else if (key === 'AUTO_UTILIZATION')      AUTO_UTILIZATION = v;
        else if (key === 'AUTO_COOLING_K')        AUTO_COOLING_K = v;
        else if (key === 'AUTO_CLAMP_T_PER_G')    AUTO_CLAMP_T_PER_G = v;
        else if (key === 'AUTO_CLAMP_T_PER_CM2')  AUTO_CLAMP_T_PER_CM2 = v;
        else if (key === 'TONNAGE_SAFETY_FACTOR') TONNAGE_SAFETY_FACTOR = v;
        wrap[key] = v;
        inp.classList.toggle('edited', v !== defaultV);
        persistUserConstants();
        recalculate();
        renderOutputs();
      });
      tdInput.appendChild(inp);
      tr.append(tdLabel, tdInput);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    container.appendChild(table);
  }

  // Initialize on load
  window.addEventListener('DOMContentLoaded', async () => {
    loadUserConstants();          // merge localStorage overrides FIRST, before any render/calc
    populateResinFamilyOptions();
    attachInputListeners();
    attachBlendListeners();
    attachImportListeners();
    const searchEl = document.getElementById('parts-search');
    if (searchEl) searchEl.addEventListener('input', renderPartsList);
    document.addEventListener('click', handleAnchorClick);
    await Promise.all([loadPartsList(), loadBlendsList()]);
    renderEditableConstants();    // populate the editable panel
    recalculate();
    renderOutputs();
    renderBlendBuilder();
    updateToolBar();
    updateBadges();
    updateAutoLockUI();
  });
</script>
