<script>
  // DEFAULTS — the blank/new-part editor state. Text fields go '', numerics go null.
  // Placeholders in the markup hint at sample values without committing them.
  const DEFAULTS = {
    partNumber: '',
    partName: '',
    region: '',
    // Volume from CAD (cm³). When set with a resin blend, the calc derives
    // partWeightG = volume × density. Explicit partWeightG always wins.
    partVolumeCm3: null,
    partWeightG: null,
    runnerPct: 14,
    runnerWeightOverride: null,
    regrindRate: 0.30,
    cavities: null,
    cycleTimeSec: null,
    utilization: null,
    scrapRate: 0.02,
    resinCostPerKg: null,
    tonnage: null,
    machineRateOverride: null,
    laborRateOverride: null,
    ohRateOverride: null,
    marginRateOverride: null,
    toolingCost: null,
    toolLife: null,
    cumulativeVolume: null,
    wallThicknessMm: null,
    annualVolume: null,
    autoEstimate: false,
    resinBlend: null,  // { resins: [{resinId, weightPct}], filler: {type, pct}, kOverride, savedBlendKey, name }
    // 'exw' = compare apples-to-apples with a supplier quote (excludes duty + freight).
    // 'landed' = total cost to Base Power's dock (includes 25% Section 301 duty + ocean freight).
    comparisonMode: 'exw',
    // Minutes of secondary ops per part. 0 = clean-shot mold-only (most parts).
    secOpsMin: 0,
    // 1 operator per N machines. Null = use regional default (USA 1, MX 2, CN 4, ID 5).
    operatorsPerMachineOverride: null,
    // Projected area in cm² (clamp cross-section). Drives tonnage when the part
    // is flat / high-aspect (lids, plates) — for those, projArea × coeff
    // dominates shot weight × 1.0.
    projectedAreaCm2: null,
    // Tonnage per cm² for the clamp-from-area calc. 3.0 default for GF-filled.
    projAreaClampCoeff: 3.0
  };

  // ============================================================================
  // EDITABLE CONSTANTS — single source of truth for the client-side calc and
  // all helper functions. Each value below has a corresponding row in the
  // "Editable constants" panel; user edits mutate these in-place and persist
  // to localStorage. CONSTANTS_DEFAULTS (frozen, below) captures the original
  // values so "Reset to defaults" can restore them.
  //
  // The server-side mirror in Calc.gs / Data.gs is independent — it's only
  // used during export. Edits made in the browser don't propagate to the
  // server (deliberate: avoids a round-trip per keystroke).
  // ============================================================================

  // Auto-estimate constants. Sources cited inline; see methodology #m-auto.
  let AUTO_TARGET_HOURS = 4000;       // production hours/yr per tool
  let AUTO_UTILIZATION  = 0.85;       // industry-standard utilization default
  let AUTO_COOLING_K    = 2.5;        // fallback cooling coefficient (s/mm²) when no resin/blend selected
  let TONNAGE_SAFETY_FACTOR = 1.15;   // industry 10-20% above theoretical min (Plastics Tech)
  // Cycle overhead has two components:
  //   1. Wall-thickness factor — thin walls correlate with intricate geometry
  //      (ribs, bosses, hollows, cooling fins) which add to mold-motion and
  //      ejection time.
  //   2. Part-mass factor — bigger shots take longer to fill, pack, and
  //      recover. Bigger presses move slower (heavier mold halves). For
  //      multi-cavity tools the relevant mass is total shot weight, not
  //      single-part weight.
  // Source: Rosato Ch.6 + field observation across small-to-mega presses.
  function cycleOverheadByWall(wallMm) {
    if (wallMm < 1.8) return 14;   // thin / complex (lids, fins, electronics housings)
    if (wallMm < 3.5) return 11;   // typical (consumer goods, automotive trim)
    return 9;                       // thick / simple (handles, structural)
  }
  function cycleBonusByShot(shotGramms) {
    if (!(shotGramms > 0))    return 0;
    if (shotGramms < 50)      return 0;    // tiny shots fill instantly
    if (shotGramms < 200)     return 2;    // small parts
    if (shotGramms < 500)     return 5;    // medium parts
    if (shotGramms < 1000)    return 8;    // large parts (typical of 700-1500T presses)
    if (shotGramms < 2000)    return 12;   // very large (1500-3000T)
    return 18;                              // huge (3000T+ Mega presses)
  }
  let AUTO_CLAMP_T_PER_G = 1.0;       // shot-weight rule of thumb (lower bound)
  // Projected-area clamp pressure for GF-filled engineering thermoplastics.
  // Sources: Rosato §7.4 (5-8 tons/in² = 0.78-1.24 T/cm²); PMM "Sizing the
  // press" (4-6 T/in² for filled engineering resins). 0.85 is the midpoint.
  let AUTO_CLAMP_T_PER_CM2 = 0.85;
  const CAVITY_STEPS = [1, 2, 4, 6, 8, 12, 16, 24, 32, 48, 64];
  const TONNAGE_STEPS = [50, 80, 100, 150, 200, 300, 400, 500, 700, 1000, 1500, 2000, 2500, 3000, 4000, 5000];
  const AUTO_FIELDS = ['cavities', 'cycleTimeSec', 'utilization', 'tonnage'];

  // Size-based cavity minimum. Single-cavity tools have poor ROI for small
  // parts — the mold steel cost is mostly fixed regardless of part size,
  // so molders default to multi-cavity even at low annual volume.
  // Source: SPE Plastics Engineering, "Cavity count economics", Mold-Making
  // Technology magazine cavity sizing guidelines.
  function cavityMinBySize(partWeightG) {
    if (!(partWeightG > 0)) return 1;
    if (partWeightG < 5)    return 8;
    if (partWeightG < 20)   return 4;
    if (partWeightG < 50)   return 2;
    return 1;  // >= 50g → single-cavity is economically viable
  }

  // Maximum cavities by part size. Large parts can't fit in many cavities
  // because the tool footprint outgrows available press platen sizes (and
  // shot weight outgrows machine injection capacity). Caps below correspond
  // roughly to a 1500T-max platen × 50% utilization for cavity layout.
  function cavityMaxBySize(partWeightG) {
    if (!(partWeightG > 0)) return 64;
    if (partWeightG > 500)  return 1;
    if (partWeightG > 200)  return 2;
    if (partWeightG > 50)   return 4;
    if (partWeightG > 20)   return 8;
    if (partWeightG > 5)    return 16;
    return 32;
  }

  // Cooling coefficients k (s/mm²) and unfilled density (g/cm³) for common
  // base resins. Cycle time ≈ overhead + k × wall². Density is used to derive
  // part mass when the user supplies volume from CAD instead of weight.
  // Sourced from molding handbooks (Rosato, Osswald) and field practice — typical, not authoritative.
  let BASE_RESINS = {
    ABS:    { k: 2.5, density: 1.04, name: 'ABS' },
    PP:     { k: 2.0, density: 0.91, name: 'PP' },
    PE_HD:  { k: 2.2, density: 0.95, name: 'PE (HDPE)' },
    PS:     { k: 2.3, density: 1.05, name: 'PS' },
    PC:     { k: 3.2, density: 1.20, name: 'PC' },
    PA6:    { k: 2.7, density: 1.13, name: 'PA6 (Nylon 6)' },
    PA66:   { k: 2.6, density: 1.14, name: 'PA66 (Nylon 66)' },
    POM:    { k: 3.0, density: 1.41, name: 'POM (Acetal)' },
    PET:    { k: 2.8, density: 1.38, name: 'PET' },
    PMMA:   { k: 3.5, density: 1.18, name: 'PMMA (Acrylic)' },
    PBT:    { k: 2.6, density: 1.31, name: 'PBT' },
    TPU:    { k: 2.6, density: 1.20, name: 'TPU' },
    TPE:    { k: 2.4, density: 0.95, name: 'TPE' }
  };

  // Filler increments k (slower cooling through the gel layer). Bump is added per 10% loading.
  let FILLER_BUMPS = {
    none:    { bumpPer10Pct: 0.00, name: 'None' },
    glass:   { bumpPer10Pct: 0.15, name: 'Glass fiber' },
    talc:    { bumpPer10Pct: 0.10, name: 'Talc' },
    mineral: { bumpPer10Pct: 0.10, name: 'Mineral' },
    caco3:   { bumpPer10Pct: 0.08, name: 'CaCO₃' }
  };

  // Filler material densities (g/cm³). Used in computeDensityBlend via the
  // volumetric rule of mixtures: 1/d_blend = w_resin/d_resin + w_filler/d_filler.
  // PBT(1.31) + 30wt% glass(2.55) → blend ≈ 1.52, matching RTP 1005 spec.
  // Regional cost defaults (labor rate, overhead, margin, freight, duty, ...).
  // multiplier scales the bracket machine rate down for offshore regions.
  // resinPriceFactor scales NA spec-sheet resin prices to local market.
  let REGIONS = {
    USA:       { laborRate: 28.50, secMachineRate: 10.0, secOpsMin: 0.25, operatorsPerMachine: 1.0, ohRate: 0.90, sgaRate: 0.07, marginRate: 0.10, pkg: 0.08, freight: 0.04, duty: 0.00, multiplier: 1.00, resinPriceFactor: 1.00 },
    Mexico:    { laborRate: 5.80,  secMachineRate: 6.5,  secOpsMin: 0.30, operatorsPerMachine: 2.0, ohRate: 0.60, sgaRate: 0.06, marginRate: 0.09, pkg: 0.07, freight: 0.08, duty: 0.00, multiplier: 0.65, resinPriceFactor: 0.85 },
    China:     { laborRate: 7.20,  secMachineRate: 5.5,  secOpsMin: 0.35, operatorsPerMachine: 4.0, ohRate: 0.65, sgaRate: 0.07, marginRate: 0.08, pkg: 0.06, freight: 0.18, duty: 0.25, multiplier: 0.58, resinPriceFactor: 0.60 },
    Indonesia: { laborRate: 2.80,  secMachineRate: 4.0,  secOpsMin: 0.45, operatorsPerMachine: 5.0, ohRate: 0.45, sgaRate: 0.05, marginRate: 0.08, pkg: 0.06, freight: 0.22, duty: 0.10, multiplier: 0.45, resinPriceFactor: 0.65 }
  };

  // Machine rate brackets — USA base $/hr by max tonnage. Region multiplier
  // (above) scales these for offshore. Calibrated to Plastics News surveys.
  let TONNAGE_BRACKETS = [
    { maxTons: 50,   baseUSA: 45  }, { maxTons: 80,   baseUSA: 52  },
    { maxTons: 100,  baseUSA: 58  }, { maxTons: 150,  baseUSA: 68  },
    { maxTons: 200,  baseUSA: 75  }, { maxTons: 300,  baseUSA: 88  },
    { maxTons: 400,  baseUSA: 98  }, { maxTons: 500,  baseUSA: 110 },
    { maxTons: 700,  baseUSA: 125 }, { maxTons: 1000, baseUSA: 155 },
    { maxTons: 1500, baseUSA: 200 }, { maxTons: 2000, baseUSA: 245 },
    { maxTons: 2500, baseUSA: 290 }, { maxTons: 3000, baseUSA: 330 },
    { maxTons: 4000, baseUSA: 400 }, { maxTons: 5000, baseUSA: 470 },
    { maxTons: 9999, baseUSA: 560 }
  ];

  let FILLER_DENSITIES = {
    none:    0,
    glass:   2.55,
    talc:    2.75,
    mineral: 2.70,
    caco3:   2.71
  };

  // ============================================================================
  // Frozen defaults — captured BEFORE any localStorage merge so "Reset to
  // defaults" can always restore the original values. Deep-clone via JSON
  // because Object.freeze would prevent reassignment in the reset path.
  // ============================================================================
  const CONSTANTS_DEFAULTS = JSON.parse(JSON.stringify({
    REGIONS, TONNAGE_BRACKETS, BASE_RESINS, FILLER_BUMPS, FILLER_DENSITIES,
    AUTO_TARGET_HOURS, AUTO_UTILIZATION, AUTO_COOLING_K,
    AUTO_CLAMP_T_PER_G, AUTO_CLAMP_T_PER_CM2, TONNAGE_SAFETY_FACTOR
  }));
  Object.freeze(CONSTANTS_DEFAULTS);

  const USER_CONSTANTS_KEY = 'shouldCost.userConstants.v1';

  // Persist current user-edited values to localStorage. Storing the whole
  // overlay object (not just diffs from defaults) keeps the load path simple.
  function persistUserConstants() {
    try {
      const overlay = {
        REGIONS, TONNAGE_BRACKETS, BASE_RESINS, FILLER_BUMPS, FILLER_DENSITIES,
        AUTO_TARGET_HOURS, AUTO_UTILIZATION, AUTO_COOLING_K,
        AUTO_CLAMP_T_PER_G, AUTO_CLAMP_T_PER_CM2, TONNAGE_SAFETY_FACTOR
      };
      localStorage.setItem(USER_CONSTANTS_KEY, JSON.stringify(overlay));
    } catch (e) {
      console.warn('persistUserConstants failed:', e.message);
    }
  }

  // Load user-edited values from localStorage on page boot, merging into the
  // live constants. Silently ignores corrupt JSON or schema drift.
  function loadUserConstants() {
    try {
      const raw = localStorage.getItem(USER_CONSTANTS_KEY);
      if (!raw) return false;
      const overlay = JSON.parse(raw);
      if (!overlay || typeof overlay !== 'object') return false;
      if (overlay.REGIONS && typeof overlay.REGIONS === 'object') Object.assign(REGIONS, overlay.REGIONS);
      if (Array.isArray(overlay.TONNAGE_BRACKETS)) TONNAGE_BRACKETS = overlay.TONNAGE_BRACKETS;
      if (overlay.BASE_RESINS && typeof overlay.BASE_RESINS === 'object') Object.assign(BASE_RESINS, overlay.BASE_RESINS);
      if (overlay.FILLER_BUMPS && typeof overlay.FILLER_BUMPS === 'object') Object.assign(FILLER_BUMPS, overlay.FILLER_BUMPS);
      if (overlay.FILLER_DENSITIES && typeof overlay.FILLER_DENSITIES === 'object') Object.assign(FILLER_DENSITIES, overlay.FILLER_DENSITIES);
      if (typeof overlay.AUTO_TARGET_HOURS === 'number')      AUTO_TARGET_HOURS = overlay.AUTO_TARGET_HOURS;
      if (typeof overlay.AUTO_UTILIZATION === 'number')       AUTO_UTILIZATION = overlay.AUTO_UTILIZATION;
      if (typeof overlay.AUTO_COOLING_K === 'number')         AUTO_COOLING_K = overlay.AUTO_COOLING_K;
      if (typeof overlay.AUTO_CLAMP_T_PER_G === 'number')     AUTO_CLAMP_T_PER_G = overlay.AUTO_CLAMP_T_PER_G;
      if (typeof overlay.AUTO_CLAMP_T_PER_CM2 === 'number')   AUTO_CLAMP_T_PER_CM2 = overlay.AUTO_CLAMP_T_PER_CM2;
      if (typeof overlay.TONNAGE_SAFETY_FACTOR === 'number')  TONNAGE_SAFETY_FACTOR = overlay.TONNAGE_SAFETY_FACTOR;
      return true;
    } catch (e) {
      console.warn('loadUserConstants failed:', e.message);
      return false;
    }
  }

  // Reset one category back to its frozen default. Triggers persistUserConstants
  // and a recalculate after applying.
  function resetConstantsCategory(category) {
    const defaults = CONSTANTS_DEFAULTS;
    switch (category) {
      case 'regions':
        Object.keys(REGIONS).forEach(k => delete REGIONS[k]);
        Object.assign(REGIONS, JSON.parse(JSON.stringify(defaults.REGIONS)));
        break;
      case 'tonnage':
        TONNAGE_BRACKETS = JSON.parse(JSON.stringify(defaults.TONNAGE_BRACKETS));
        break;
      case 'resins':
        Object.keys(BASE_RESINS).forEach(k => delete BASE_RESINS[k]);
        Object.assign(BASE_RESINS, JSON.parse(JSON.stringify(defaults.BASE_RESINS)));
        break;
      case 'fillers':
        Object.keys(FILLER_BUMPS).forEach(k => delete FILLER_BUMPS[k]);
        Object.assign(FILLER_BUMPS, JSON.parse(JSON.stringify(defaults.FILLER_BUMPS)));
        Object.keys(FILLER_DENSITIES).forEach(k => delete FILLER_DENSITIES[k]);
        Object.assign(FILLER_DENSITIES, JSON.parse(JSON.stringify(defaults.FILLER_DENSITIES)));
        break;
      case 'auto':
        AUTO_TARGET_HOURS = defaults.AUTO_TARGET_HOURS;
        AUTO_UTILIZATION = defaults.AUTO_UTILIZATION;
        AUTO_COOLING_K = defaults.AUTO_COOLING_K;
        AUTO_CLAMP_T_PER_G = defaults.AUTO_CLAMP_T_PER_G;
        AUTO_CLAMP_T_PER_CM2 = defaults.AUTO_CLAMP_T_PER_CM2;
        TONNAGE_SAFETY_FACTOR = defaults.TONNAGE_SAFETY_FACTOR;
        break;
      case 'all':
        resetConstantsCategory('regions');
        resetConstantsCategory('tonnage');
        resetConstantsCategory('resins');
        resetConstantsCategory('fillers');
        resetConstantsCategory('auto');
        break;
    }
    persistUserConstants();
    renderEditableConstants();
    recalculate();
    renderOutputs();
    updateBadges();
  }

  // Weighted blend density (g/cm³). Weight-averages resin densities, then
  // applies the volumetric mixture rule with filler. Returns null when the
  // composition is incomplete.
  function computeDensityBlend(comp) {
    if (!comp) return null;
    const resins = (comp.resins || []).filter(r => r && r.resinId && BASE_RESINS[r.resinId] && r.weightPct > 0);
    if (resins.length === 0) return null;
    const total = resins.reduce((s, r) => s + r.weightPct, 0);
    if (total <= 0) return null;
    const dResin = resins.reduce((s, r) => s + BASE_RESINS[r.resinId].density * r.weightPct, 0) / total;
    const f = comp.filler;
    if (!f || f.type === 'none' || !(f.pct > 0)) return dResin;
    const dFiller = FILLER_DENSITIES[f.type] || 0;
    if (dFiller <= 0) return dResin;
    const wF = f.pct / 100;
    const wR = 1 - wF;
    return 1 / (wR / dResin + wF / dFiller);
  }

  // Effective part weight: explicit partWeightG wins; otherwise derive from
  // partVolumeCm3 × blend density. Returns null when neither path resolves.
  function resolvePartWeightG(inp) {
    const explicit = inp.partWeightG;
    if (explicit !== null && explicit !== undefined && explicit !== '' && !isNaN(+explicit) && +explicit > 0) {
      return +explicit;
    }
    if (inp.partVolumeCm3 > 0) {
      const d = computeDensityBlend(inp.resinBlend);
      if (d > 0) return inp.partVolumeCm3 * d;
    }
    return null;
  }

  // Derive the blend's cooling coefficient. Linear weight-fraction mix of base k values
  // plus a filler-type bump. Returns null when composition is incomplete.
  function computeKBlend(comp) {
    if (!comp) return null;
    if (comp.kOverride !== null && comp.kOverride !== undefined && comp.kOverride > 0) {
      return +comp.kOverride;
    }
    const resins = (comp.resins || []).filter(r => r && r.resinId && BASE_RESINS[r.resinId] && r.weightPct > 0);
    if (resins.length === 0) return null;
    const total = resins.reduce((s, r) => s + r.weightPct, 0);
    if (total <= 0) return null;
    const kResin = resins.reduce((s, r) => s + BASE_RESINS[r.resinId].k * r.weightPct, 0) / total;
    const f = comp.filler;
    const fillerBump = (f && f.type && f.type !== 'none' && f.pct > 0)
      ? (f.pct / 10) * (FILLER_BUMPS[f.type] || { bumpPer10Pct: 0 }).bumpPer10Pct
      : 0;
    return +(kResin + fillerBump).toFixed(2);
  }

  // True iff the resins (ignoring filler) sum to 100 ± 0.5. Used only to surface a soft warning.
  function blendIsNormalized(comp) {
    if (!comp) return true;
    const resins = (comp.resins || []).filter(r => r && r.resinId && r.weightPct > 0);
    if (resins.length === 0) return true;
    const total = resins.reduce((s, r) => s + r.weightPct, 0);
    return Math.abs(total - 100) < 0.5;
  }

  // Derive cavities, cycle time, utilization, and tonnage from CAD geometry +
  // annual volume + resin. All prerequisites must be present, otherwise the
  // function returns null and no fields are auto-filled (intentional — partial
  // auto-fill leads to silently wrong numbers when one input is missing).
  function computeAutoEstimates(s) {
    const wall = s.wallThicknessMm;
    const annual = s.annualVolume;
    const partWt = resolvePartWeightG(s);
    const projArea = s.projectedAreaCm2;
    const rp = s.runnerPct;
    // All-or-nothing gate: every downstream calc needs these. partWt
    // resolves from explicit weight OR (volume × resin density), so this
    // also implicitly requires a resin blend when only volume is set.
    if (!(wall > 0) || !(annual > 0) || !(partWt > 0) || !(projArea > 0)) return null;
    if (rp === null || rp === undefined || rp < 0) return null;

    // 1. First-pass cycle from wall only (cooling-dominated for typical parts).
    //    We'll refine after we know shot weight (which depends on cavities).
    const utilization = AUTO_UTILIZATION;
    const k = computeKBlend(s.resinBlend);
    const kEff = (k !== null && k > 0) ? k : AUTO_COOLING_K;
    const wallOverhead = cycleOverheadByWall(wall);
    const coolingS = kEff * wall * wall;
    const firstPassCycle = wallOverhead + coolingS;

    // 2. Cavities = max of three requirements, bounded by part-size cap.
    //    - Throughput need: annual / (parts_per_hr_per_cav × target_hours)
    //    - Size minimum: small parts default to multi-cavity for tool ROI
    //    - Volume minimum: high-volume parts always justify multi-cavity
    //    - Size MAXIMUM: large parts can't fit many cavities per tool
    const partsPerHrPerCav = (3600 / firstPassCycle) * utilization;
    const cavByThruput = Math.ceil(annual / (partsPerHrPerCav * AUTO_TARGET_HOURS));
    const cavBySize = cavityMinBySize(partWt);
    let cavByVolume;
    if (annual >= 1000000)      cavByVolume = 16;
    else if (annual >= 250000)  cavByVolume = 8;
    else if (annual >= 100000)  cavByVolume = 4;
    else if (annual >= 50000)   cavByVolume = 2;
    else                        cavByVolume = 1;
    const cavRawMin = Math.max(cavByThruput, cavBySize, cavByVolume);
    const cavMax = cavityMaxBySize(partWt);
    const cavRaw = Math.min(cavRawMin, cavMax);
    const cavities = CAVITY_STEPS.find(c => c >= cavRaw) || CAVITY_STEPS[CAVITY_STEPS.length - 1];

    // 3. Refine cycle with shot-weight bonus. Big shots = longer fill + pack +
    //    recovery; big presses move slower. Adds 0-18s on top of wall-based
    //    overhead depending on total shot mass.
    const shotG = partWt * cavities * (1 + rp / 100);
    const shotBonus = cycleBonusByShot(shotG);
    const cycleTimeSec = +(wallOverhead + shotBonus + coolingS).toFixed(1);

    // 4. Tonnage = max of two clamp requirements, × industry safety factor.
    //    - Shot-weight bound: shotG × 1.0 T/g (conservative lower bound)
    //    - Projected-area:    silhouette_cm² × cav × 0.85 T/cm² (GF-filled)
    //    Projected area is the face-projected silhouette from the STEP — the
    //    ACTUAL plastic cross-section accounting for hollows / through-holes,
    //    not the bbox face. (Bbox-max over-counts by 2-5× for hollow parts.)
    //    Pressure factor 0.85 T/cm² fits PBT-GF30 / PA66-GF30 / similar
    //    GF-filled engineering resins (Rosato §7.4: 5-8 T/in² = 0.78-1.24).
    //    Safety factor 1.15: real molders pick 10-20% above theoretical min
    //    (Plastics Tech "Sizing the Press").
    const tonByShot = shotG * AUTO_CLAMP_T_PER_G;
    const tonByArea = projArea * cavities * AUTO_CLAMP_T_PER_CM2;
    const tonRaw = Math.max(tonByShot, tonByArea) * TONNAGE_SAFETY_FACTOR;
    const tonnage = TONNAGE_STEPS.find(t => t >= tonRaw) || TONNAGE_STEPS[TONNAGE_STEPS.length - 1];

    return { utilization, cycleTimeSec, cavities, tonnage };
  }

  // Global state
  let state = { ...DEFAULTS };
  let savedParts = [];
  let savedBlends = [];
  let selectedPartKeys = new Set();
  let isSaving = false;
  let isSavingBlend = false;

  const MAX_BLEND_RESINS = 4;
  const BLEND_DEFAULT_FILLER = { type: 'none', pct: 0 };

  // Make a single-resin blend (used when the user picks a base resin from the family dropdown).
  function makeSingleResinBlend(resinId) {
    return {
      resins: [{ resinId, weightPct: 100 }],
      filler: { ...BLEND_DEFAULT_FILLER },
      kOverride: null,
      savedBlendKey: null,
      name: null
    };
  }

  function emptyBlend() {
    return {
      resins: [{ resinId: '', weightPct: 100 }],
      filler: { ...BLEND_DEFAULT_FILLER },
      kOverride: null,
      savedBlendKey: null,
      name: null
    };
  }

  function cloneBlend(b) {
    if (!b) return null;
    return {
      resins: (b.resins || []).map(r => ({ resinId: r.resinId, weightPct: +r.weightPct })),
      filler: { type: (b.filler && b.filler.type) || 'none', pct: +((b.filler && b.filler.pct) || 0) },
      kOverride: (b.kOverride !== null && b.kOverride !== undefined && b.kOverride !== '') ? +b.kOverride : null,
      savedBlendKey: b.savedBlendKey || null,
      name: b.name || null
    };
  }

  // Resolve a "resinFamily" dropdown value into a blend object (or null when the user picks none).
  function blendFromFamilyValue(value) {
    if (!value) return null;
    if (value === '__custom__') return emptyBlend();
    if (value.startsWith('saved:')) {
      const key = value.slice(6);
      const saved = savedBlends.find(b => b.key === key);
      return saved ? { ...cloneBlend(saved), savedBlendKey: saved.key, name: saved.name } : emptyBlend();
    }
    if (BASE_RESINS[value]) return makeSingleResinBlend(value);
    return null;
  }

  // The inverse: derive a dropdown value from a blend object so the select stays in sync.
  function familyValueFromBlend(b) {
    if (!b) return '';
    if (b.savedBlendKey) return 'saved:' + b.savedBlendKey;
    const resins = (b.resins || []).filter(r => r && r.resinId && r.weightPct > 0);
    const fillerNone = !b.filler || b.filler.type === 'none' || !(b.filler.pct > 0);
    const noOverride = b.kOverride === null || b.kOverride === undefined;
    if (resins.length === 1 && resins[0].weightPct === 100 && fillerNone && noOverride) {
      return resins[0].resinId;
    }
    return '__custom__';
  }

  // Helper to run server functions
  function runServer(fn, ...args) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        [fn](...args);
    });
  }

  // Update state and recalculate. When auto-estimate is on and prerequisites are
  // present, derive cavities/cycle/util/tonnage from wall thickness + annual volume
  // before recalc so the cost output reflects the derived values.
  function setState(patch) {
    let next = { ...state, ...patch };
    if (next.autoEstimate) {
      const est = computeAutoEstimates(next);
      if (est) next = { ...next, ...est };
    }
    state = next;
    recalculate();
    renderOutputs();
    renderBlendBuilder();
    updateToolBar();
    updateBadges();
    updateAutoLockUI();
  }

  // Mutate state.resinBlend through a callback, then push back through setState.
  function patchBlend(mutator) {
    const next = cloneBlend(state.resinBlend) || emptyBlend();
    // User-driven edits to composition decouple from any saved-blend identity.
    next.savedBlendKey = null;
    next.name = null;
    mutator(next);
    setState({ resinBlend: next });
  }

  // Visually lock the four auto-derived inputs when autoEstimate is on, and
  // show the small "auto" badge next to each label.
  function updateAutoLockUI() {
    const locked = !!state.autoEstimate;
    AUTO_FIELDS.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.readOnly = locked;
      el.classList.toggle('locked', locked);
    });
    document.querySelectorAll('.auto-badge').forEach(b => { b.hidden = !locked; });
    const cb = document.getElementById('autoEstimate');
    if (cb) cb.checked = locked;
  }

  // Populate the resin-family dropdown's two optgroups (base resins + saved blends).
  // Called once at init and whenever the saved-blends list changes.
  function populateResinFamilyOptions() {
    const sel = document.getElementById('resinFamily');
    if (!sel) return;
    const singleGroup = document.getElementById('single-resin-optgroup');
    const savedGroup = document.getElementById('saved-blends-optgroup');
    singleGroup.replaceChildren();
    savedGroup.replaceChildren();
    Object.keys(BASE_RESINS).forEach(id => {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = BASE_RESINS[id].name;
      singleGroup.appendChild(opt);
    });
    if (savedBlends.length === 0) {
      savedGroup.style.display = 'none';
    } else {
      savedGroup.style.display = '';
      savedBlends.forEach(b => {
        const opt = document.createElement('option');
        opt.value = 'saved:' + b.key;
        opt.textContent = b.name + ' (k=' + (computeKBlend(b) || '?') + ')';
        savedGroup.appendChild(opt);
      });
    }
  }

  // Render the blend builder. Driven entirely by state.resinBlend.
  // Rebuilds the row DOM only when the structure changed (count or resin ids) —
  // value-only edits leave the row inputs alone so they don't lose focus mid-keystroke.
  function renderBlendBuilder() {
    const sel = document.getElementById('resinFamily');
    const panel = document.getElementById('blend-composition');
    if (!sel || !panel) return;

    const blend = state.resinBlend;
    sel.value = familyValueFromBlend(blend);

    if (!blend) {
      panel.hidden = true;
      return;
    }
    panel.hidden = false;

    const rowsEl = document.getElementById('blend-resin-rows');
    const resins = blend.resins || [];
    const signature = resins.map(r => r.resinId || '_').join('|') + '#' + resins.length;
    if (rowsEl.dataset.sig !== signature) {
      rowsEl.replaceChildren();
      resins.forEach((r, idx) => rowsEl.appendChild(buildResinRow(r, idx, resins.length)));
      rowsEl.dataset.sig = signature;
    } else {
      // Same structure — just sync values into the existing inputs so they
      // don't fight the user's in-progress typing.
      Array.from(rowsEl.children).forEach((row, idx) => {
        const pctInput = row.querySelector('.blend-pct-input');
        if (pctInput && pctInput !== document.activeElement) {
          pctInput.value = resins[idx].weightPct;
        }
      });
    }

    const addBtn = document.getElementById('add-resin-btn');
    addBtn.disabled = resins.length >= MAX_BLEND_RESINS;

    const sum = resins.reduce((s, r) => s + (+r.weightPct || 0), 0);
    const sumLabel = document.getElementById('blend-sum-label');
    sumLabel.textContent = 'Σ = ' + sum.toFixed(0) + '%';
    sumLabel.className = 'blend-sum-label ' + (Math.abs(sum - 100) < 0.5 ? 'ok' : 'warn');

    document.getElementById('fillerType').value = (blend.filler && blend.filler.type) || 'none';
    const fillerPctEl = document.getElementById('fillerPct');
    if (document.activeElement !== fillerPctEl) {
      fillerPctEl.value = (blend.filler && blend.filler.pct > 0) ? blend.filler.pct : '';
    }

    const kOverrideEl = document.getElementById('kOverride');
    if (document.activeElement !== kOverrideEl) {
      kOverrideEl.value = (blend.kOverride !== null && blend.kOverride !== undefined) ? blend.kOverride : '';
    }
    // Auto-open the advanced disclosure when an override is set so it's visible.
    const adv = kOverrideEl.closest('details');
    if (adv && blend.kOverride !== null && blend.kOverride !== undefined && !adv.open) adv.open = true;

    const k = computeKBlend(blend);
    const kEl = document.getElementById('derived-k');
    kEl.textContent = (k !== null && k > 0) ? (k.toFixed(2) + ' s/mm²') : '— s/mm²';

    const warn = document.getElementById('blend-warning');
    if (!blendIsNormalized(blend)) {
      warn.hidden = false;
      warn.textContent = 'Weights don’t sum to 100% — normalized internally.';
    } else if (blend.kOverride !== null && blend.kOverride !== undefined && blend.kOverride > 0) {
      warn.hidden = false;
      warn.textContent = 'Using override k — blend math bypassed.';
    } else {
      warn.hidden = true;
    }

    const saveBtn = document.getElementById('save-blend-btn');
    const deleteBtn = document.getElementById('delete-blend-btn');
    saveBtn.disabled = !(k !== null && k > 0);
    if (blend.savedBlendKey) {
      saveBtn.textContent = 'Update saved blend';
      deleteBtn.hidden = false;
    } else {
      saveBtn.textContent = 'Save as named blend…';
      deleteBtn.hidden = true;
    }
  }

  function buildResinRow(r, idx, total) {
    const row = document.createElement('div');
    row.className = 'blend-resin-row';

    const sel = document.createElement('select');
    sel.setAttribute('aria-label', 'Resin ' + (idx + 1));
    const blank = document.createElement('option');
    blank.value = '';
    blank.textContent = '— select resin —';
    sel.appendChild(blank);
    Object.keys(BASE_RESINS).forEach(id => {
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = BASE_RESINS[id].name + ' (k=' + BASE_RESINS[id].k + ')';
      sel.appendChild(opt);
    });
    sel.value = r.resinId || '';
    sel.addEventListener('change', () => {
      patchBlend(b => { b.resins[idx].resinId = sel.value; });
    });

    const pct = document.createElement('input');
    pct.type = 'number';
    pct.min = '0';
    pct.max = '100';
    pct.step = 'any';
    pct.inputMode = 'decimal';
    pct.className = 'blend-pct-input';
    pct.setAttribute('aria-label', 'Weight % for resin ' + (idx + 1));
    pct.value = r.weightPct;
    pct.addEventListener('input', () => {
      const v = pct.value === '' ? 0 : parseFloat(pct.value);
      patchBlend(b => { b.resins[idx].weightPct = Number.isFinite(v) ? v : 0; });
    });

    const rm = document.createElement('button');
    rm.type = 'button';
    rm.className = 'blend-remove-btn';
    rm.setAttribute('aria-label', 'Remove resin ' + (idx + 1));
    rm.textContent = '×';
    rm.disabled = total <= 1;
    rm.addEventListener('click', () => {
      patchBlend(b => { b.resins.splice(idx, 1); });
    });

    row.append(sel, pct, rm);
    return row;
  }

  // Attach listeners that drive the blend builder (family dropdown, filler, override, add/save/clear).
  function attachBlendListeners() {
    const family = document.getElementById('resinFamily');
    if (family) {
      family.addEventListener('change', () => {
        setState({ resinBlend: blendFromFamilyValue(family.value) });
      });
    }

    const addBtn = document.getElementById('add-resin-btn');
    if (addBtn) {
      addBtn.addEventListener('click', () => {
        patchBlend(b => {
          if ((b.resins || []).length >= MAX_BLEND_RESINS) return;
          b.resins.push({ resinId: '', weightPct: 0 });
        });
      });
    }

    const fillerType = document.getElementById('fillerType');
    if (fillerType) {
      fillerType.addEventListener('change', () => {
        patchBlend(b => { b.filler = b.filler || { ...BLEND_DEFAULT_FILLER }; b.filler.type = fillerType.value; });
      });
    }

    const fillerPct = document.getElementById('fillerPct');
    if (fillerPct) {
      fillerPct.addEventListener('input', () => {
        const v = fillerPct.value === '' ? 0 : parseFloat(fillerPct.value);
        patchBlend(b => { b.filler = b.filler || { ...BLEND_DEFAULT_FILLER }; b.filler.pct = Number.isFinite(v) ? v : 0; });
      });
    }

    const kOverride = document.getElementById('kOverride');
    if (kOverride) {
      kOverride.addEventListener('input', () => {
        const v = kOverride.value === '' ? null : parseFloat(kOverride.value);
        patchBlend(b => { b.kOverride = (v !== null && Number.isFinite(v) && v > 0) ? v : null; });
      });
    }

    const saveBtn = document.getElementById('save-blend-btn');
    if (saveBtn) saveBtn.addEventListener('click', handleSaveBlend);

    const deleteBtn = document.getElementById('delete-blend-btn');
    if (deleteBtn) deleteBtn.addEventListener('click', handleDeleteBlend);

    const clearBtn = document.getElementById('clear-blend-btn');
    if (clearBtn) clearBtn.addEventListener('click', () => setState({ resinBlend: null }));
  }

  // Add event listeners for all inputs
  function attachInputListeners() {
    // projAreaClampCoeff intentionally absent — UI no longer exposes it; the calc
    // uses the AUTO_CLAMP_T_PER_CM2 constant (3.0) for everyone.
    const inputs = ['partNumber', 'partName', 'region', 'partVolumeCm3', 'partWeightG', 'runnerPct', 'runnerWeightOverride', 'regrindRate', 'cavities', 'cycleTimeSec', 'utilization', 'scrapRate', 'resinCostPerKg', 'tonnage', 'machineRateOverride', 'laborRateOverride', 'ohRateOverride', 'marginRateOverride', 'toolingCost', 'toolLife', 'cumulativeVolume', 'wallThicknessMm', 'annualVolume', 'secOpsMin', 'operatorsPerMachineOverride', 'projectedAreaCm2'];

    inputs.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        el.addEventListener('input', (e) => {
          let val;
          if (e.target.type === 'number' || e.target.type === 'range') {
            if (e.target.value === '') {
              val = null;
            } else {
              val = parseFloat(e.target.value);
              if (Number.isFinite(val)) {
                const min = e.target.min !== '' ? parseFloat(e.target.min) : null;
                const max = e.target.max !== '' ? parseFloat(e.target.max) : null;
                if (min !== null && val < min) { val = min; e.target.value = String(min); }
                if (max !== null && val > max) { val = max; e.target.value = String(max); }
              }
            }
          } else {
            val = e.target.value;
          }
          setState({ [id]: val });
        });
      }
    });

    const toggle = document.getElementById('autoEstimate');
    if (toggle) {
      toggle.addEventListener('change', (e) => setState({ autoEstimate: !!e.target.checked }));
    }

    // Comparison mode is a radio group: 'exw' (compare to supplier quote) vs.
    // 'landed' (total to Base Power's dock). Affects whether duty + freight are
    // added on top of supplierPrice.
    const modeRadios = document.querySelectorAll('input[name="comparisonMode"]');
    modeRadios.forEach(radio => {
      radio.addEventListener('change', (e) => {
        if (e.target.checked) setState({ comparisonMode: e.target.value });
      });
    });
  }

  // Client-side cost calculation (mirrors Calc.gs).
  // Stacking: mfgCost → (×SGA) → (×margin) → supplierPrice → +freight +duty → landedCost.
  // comparisonMode='exw' returns supplierPrice; 'landed' returns landedCost.
  function calcSC(inp) {
    const r = REGIONS[inp.region] || REGIONS.Mexico;
    const bracket = TONNAGE_BRACKETS.find(b => inp.tonnage <= b.maxTons) || TONNAGE_BRACKETS[TONNAGE_BRACKETS.length - 1];
    const results = {};

    const machineRate = inp.machineRateOverride !== null && inp.machineRateOverride !== undefined ? inp.machineRateOverride : (bracket.baseUSA * r.multiplier);
    results._machineRate = machineRate;

    // Resolve part weight: explicit user input wins, else derive from volume × blend density.
    const effectivePartWeightG = resolvePartWeightG(inp);
    results._effectivePartWeightG = effectivePartWeightG;

    const runnerWeightG = inp.runnerWeightOverride !== null && inp.runnerWeightOverride !== undefined ? inp.runnerWeightOverride : (effectivePartWeightG * inp.runnerPct / 100);
    const grossG = effectivePartWeightG + (runnerWeightG * (1 - inp.regrindRate));
    const grossKg = grossG / 1000;
    const resinPP = grossKg * inp.resinCostPerKg;
    const matScrap = resinPP * inp.scrapRate;
    const matTotal = resinPP + matScrap;
    results.resinCostPerPart = resinPP;

    const partsPerHr = (3600 / inp.cycleTimeSec) * inp.utilization * inp.cavities;
    const machPP = machineRate / partsPerHr;
    const machScrap = machPP * inp.scrapRate;
    const machTotal = machPP + machScrap;

    const laborRate = inp.laborRateOverride !== null && inp.laborRateOverride !== undefined ? inp.laborRateOverride : r.laborRate;
    const operatorsPerMachine = inp.operatorsPerMachineOverride !== null && inp.operatorsPerMachineOverride !== undefined
      ? Math.max(0.0001, +inp.operatorsPerMachineOverride)
      : (r.operatorsPerMachine || 1);
    const secOpsMin = inp.secOpsMin !== null && inp.secOpsMin !== undefined ? +inp.secOpsMin : r.secOpsMin;
    const directLP = (laborRate / partsPerHr) / operatorsPerMachine;
    const secLP = laborRate * (secOpsMin / 60);
    const laborScrap = (directLP + secLP) * inp.scrapRate;
    const laborTotal = directLP + secLP + laborScrap;

    const secMachPP = r.secMachineRate * (secOpsMin / 60);
    const ohRate = inp.ohRateOverride !== null && inp.ohRateOverride !== undefined ? (inp.ohRateOverride / 100) : r.ohRate;
    const ohTotal = (directLP + secLP) * ohRate;
    const pkg = r.pkg;
    const freight = r.freight;

    const manufacturingCost = matTotal + machTotal + laborTotal + secMachPP + ohTotal + pkg;
    const sgaRate = r.sgaRate;
    const marginRate = inp.marginRateOverride !== null && inp.marginRateOverride !== undefined ? (inp.marginRateOverride / 100) : r.marginRate;
    const costWithSga = manufacturingCost * (1 + sgaRate);
    const supplierPrice = costWithSga * (1 + marginRate);
    const sga = costWithSga - manufacturingCost;
    const profit = supplierPrice - costWithSga;

    const duty = supplierPrice * r.duty;
    const landedCost = supplierPrice + freight + duty;

    const mode = inp.comparisonMode === 'landed' ? 'landed' : 'exw';
    const baseTotal = mode === 'landed' ? landedCost : supplierPrice;

    results.processingCostPerPart = machPP + directLP + secLP + secMachPP;
    results.scrapCostPerPart = matScrap + machScrap + laborScrap;
    results.overheadCostPerPart = ohTotal;
    results.profit = profit;
    results._sga = sga;
    results._duty = duty;
    results._freight = freight;
    results._pkg = pkg;
    results._manufacturingCost = manufacturingCost;
    results._supplierPrice = supplierPrice;
    results._landedCost = landedCost;
    results._comparisonMode = mode;
    results._operatorsPerMachine = operatorsPerMachine;
    results._secOpsMin = secOpsMin;
    results._baseTotal = baseTotal;

    const toolLifeParts = inp.toolLife * inp.cavities;
    const toolPaidOff = inp.cumulativeVolume >= toolLifeParts;
    const toolAmortRaw = toolPaidOff || !toolLifeParts ? 0 : inp.toolingCost / toolLifeParts;
    const toolScrap = toolAmortRaw * inp.scrapRate;
    const toolAmortPP = toolAmortRaw + toolScrap;
    results._toolAmortPP = toolAmortPP;
    results._totalWithTooling = baseTotal + toolAmortPP;
    results._toolPaidOff = toolPaidOff;
    results._toolLifeParts = toolLifeParts;
    results._toolPctUsed = toolLifeParts > 0 ? Math.min((inp.cumulativeVolume / toolLifeParts) * 100, 100) : 0;

    return results;
  }

  // Toggle inline formula rows beneath an output row
  function toggleFormula(btn) {
    const target = document.getElementById(btn.getAttribute('aria-controls'));
    if (!target) return;
    const open = btn.getAttribute('aria-expanded') === 'true';
    btn.setAttribute('aria-expanded', open ? 'false' : 'true');
    target.hidden = open;
  }

  // Intercept in-page anchor clicks so they smooth-scroll instead of triggering
  // a top-level navigation. Inside the Apps Script userCodeAppPanel iframe a
  // native #fragment nav reloads the iframe to a blank sandbox URL (white
  // screen). We also open any collapsed <details> ancestor (e.g. the
  // methodology panel) so the target is actually visible after the jump.
  function handleAnchorClick(e) {
    const a = e.target.closest('a[href^="#"]');
    if (!a) return;
    const href = a.getAttribute('href');
    if (!href || href === '#') return;
    const id = href.slice(1);
    const target = document.getElementById(id);
    if (!target) return;
    e.preventDefault();
    let parent = target.parentElement;
    while (parent) {
      if (parent.tagName === 'DETAILS' && !parent.open) parent.open = true;
      parent = parent.parentElement;
    }
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    target.classList.add('anchor-flash');
    setTimeout(() => target.classList.remove('anchor-flash'), 1200);
  }

  // Recalculate outputs
  function recalculate() {
    // Sync input fields from state, but never overwrite the one the user is typing into —
    // partial values like "0." parse to 0, and writing 0 back would strip the trailing dot mid-keystroke.
    // Checkboxes (e.g. autoEstimate) are kept in sync by updateAutoLockUI, not .value.
    const active = document.activeElement;
    Object.keys(state).forEach(key => {
      const el = document.getElementById(key);
      if (el && key !== 'key' && key !== 'resinBlend' && el !== active && el.type !== 'checkbox') {
        el.value = state[key] !== null && state[key] !== undefined ? state[key] : '';
      }
    });

    // Comparison mode is a radio group keyed by name, not an id. Keep the
    // checked radio in sync with state.comparisonMode so loaded parts restore
    // their saved mode.
    document.querySelectorAll('input[name="comparisonMode"]').forEach(radio => {
      radio.checked = (radio.value === (state.comparisonMode || 'exw'));
    });
  }

  // Fields required for a meaningful calc; if any are blank, outputs show "—".
  // partWeightG is checked separately via resolvePartWeightG so volume+blend
  // density can substitute for an explicit weight input.
  const REQUIRED_FOR_CALC = ['region', 'runnerPct', 'regrindRate', 'cavities', 'cycleTimeSec', 'utilization', 'scrapRate', 'resinCostPerKg', 'tonnage', 'toolingCost', 'toolLife', 'cumulativeVolume'];

  function isCalcReady(s) {
    if (resolvePartWeightG(s) === null) return false;
    return REQUIRED_FOR_CALC.every(k => {
      const v = s[k];
      if (v === null || v === undefined || v === '') return false;
      if (k === 'region') return true;
      return !isNaN(Number(v));
    });
  }

  function fmt(n, decimals) {
    return (typeof n === 'number' && isFinite(n)) ? n.toFixed(decimals) : '—';
  }

  // Render output cards and table
  function renderOutputs() {
    if (!isCalcReady(state)) {
      ['total-with-tooling', 'base-total', 'tool-amort', 'resin-cost', 'processing-cost', 'profit',
       'out-total-with-tooling', 'out-base-total', 'out-tool-amort', 'out-resin', 'out-processing',
       'out-scrap', 'out-overhead', 'out-profit', 'out-machine-rate']
        .forEach(id => { document.getElementById(id).textContent = '—'; });
      document.getElementById('out-region').textContent = state.region || '—';
      document.getElementById('out-cavities').textContent = state.cavities ?? '—';
      document.getElementById('out-cycle-time').textContent = state.cycleTimeSec ?? '—';
      return;
    }

    const result = calcSC(state);

    document.getElementById('total-with-tooling').textContent = fmt(result._totalWithTooling, 4);
    document.getElementById('base-total').textContent = fmt(result._baseTotal, 4);
    document.getElementById('tool-amort').textContent = fmt(result._toolAmortPP, 4);
    document.getElementById('resin-cost').textContent = fmt(result.resinCostPerPart, 4);
    document.getElementById('processing-cost').textContent = fmt(result.processingCostPerPart, 4);
    document.getElementById('profit').textContent = fmt(result.profit, 4);

    document.getElementById('out-total-with-tooling').textContent = fmt(result._totalWithTooling, 4);
    document.getElementById('out-base-total').textContent = fmt(result._baseTotal, 4);
    document.getElementById('out-tool-amort').textContent = fmt(result._toolAmortPP, 4);
    document.getElementById('out-resin').textContent = fmt(result.resinCostPerPart, 4);
    document.getElementById('out-processing').textContent = fmt(result.processingCostPerPart, 4);
    document.getElementById('out-scrap').textContent = fmt(result.scrapCostPerPart, 4);
    document.getElementById('out-overhead').textContent = fmt(result.overheadCostPerPart, 4);
    document.getElementById('out-profit').textContent = fmt(result.profit, 4);
    document.getElementById('out-region').textContent = state.region;
    document.getElementById('out-machine-rate').textContent = fmt(result._machineRate, 2);
    document.getElementById('out-cavities').textContent = state.cavities;
    document.getElementById('out-cycle-time').textContent = state.cycleTimeSec;
  }

  // Update tooling progress bar
  function updateToolBar() {
    const fill = document.getElementById('tool-bar-fill');
    const label = document.getElementById('tool-bar-label');

    const css = getComputedStyle(document.documentElement);
    const tokenGrounded = css.getPropertyValue('--grounded').trim() || '#1E4D2B';
    const tokenWarn     = css.getPropertyValue('--yellow-60').trim() || '#AA8422';
    const tokenDanger   = css.getPropertyValue('--energy').trim()    || '#ED6C30';

    if (!isCalcReady(state)) {
      fill.style.width = '0%';
      fill.style.background = tokenGrounded;
      label.textContent = '';
      return;
    }

    const result = calcSC(state);
    fill.style.width = result._toolPctUsed + '%';
    fill.style.background = result._toolPaidOff ? tokenDanger : (result._toolPctUsed > 75 ? tokenWarn : tokenGrounded);
    label.textContent = result._toolPaidOff ? 'Tool fully amortized — tooling cost = $0/pc' : ((result._toolLifeParts - state.cumulativeVolume).toLocaleString()) + ' parts remaining on tool';
  }

  // Update override badges (uses top-level REGIONS so user-edited rates flow through)
  function updateBadges() {
    const r = REGIONS[state.region] || REGIONS.Mexico;

    // Machine rate badge
    const machOverride = state.machineRateOverride !== null && state.machineRateOverride !== undefined;
    document.getElementById('machine-rate-badge').className = 'override-badge ' + (machOverride ? 'override' : 'default');
    document.getElementById('machine-rate-badge').textContent = (machOverride ? 'override: $' : 'default: ') + (machOverride ? state.machineRateOverride.toFixed(2) : 'auto-resolved') + (machOverride ? '/hr' : '');

    // Labor rate badge
    const laborOverride = state.laborRateOverride !== null && state.laborRateOverride !== undefined;
    document.getElementById('labor-rate-badge').className = 'override-badge ' + (laborOverride ? 'override' : 'default');
    document.getElementById('labor-rate-badge').textContent = (laborOverride ? 'override: $' : 'default: $') + (laborOverride ? state.laborRateOverride.toFixed(2) : r.laborRate.toFixed(2)) + '/hr';

    // OH rate badge
    const ohOverride = state.ohRateOverride !== null && state.ohRateOverride !== undefined;
    document.getElementById('oh-rate-badge').className = 'override-badge ' + (ohOverride ? 'override' : 'default');
    document.getElementById('oh-rate-badge').textContent = (ohOverride ? 'override: ' : 'default: ') + (ohOverride ? state.ohRateOverride.toFixed(1) : (r.ohRate * 100).toFixed(1)) + '%';

    // Margin rate badge
    const marginOverride = state.marginRateOverride !== null && state.marginRateOverride !== undefined;
    document.getElementById('margin-rate-badge').className = 'override-badge ' + (marginOverride ? 'override' : 'default');
    document.getElementById('margin-rate-badge').textContent = (marginOverride ? 'override: ' : 'default: ') + (marginOverride ? state.marginRateOverride.toFixed(1) : (r.marginRate * 100).toFixed(1)) + '%';

    // Update override input styles
    document.getElementById('machineRateOverride').className = state.machineRateOverride ? 'input-field override' : 'input-field';
    document.getElementById('laborRateOverride').className = state.laborRateOverride ? 'input-field override' : 'input-field';
    document.getElementById('ohRateOverride').className = state.ohRateOverride ? 'input-field override' : 'input-field';
    document.getElementById('marginRateOverride').className = state.marginRateOverride ? 'input-field override' : 'input-field';
  }

  // Fields that are text (cleared to '') vs numbers (cleared to null).
  const TEXT_FIELDS = new Set(['partNumber', 'partName', 'region']);

  // Reset section to blank — numeric inputs go null (or back to their DEFAULTS
  // industry-standard value if one is set), text inputs go ''.
  // The 'auto' reset also flips autoEstimate off so the four target fields unlock.
  function resetSection(section) {
    const resetMap = {
      drawing: ['partVolumeCm3', 'wallThicknessMm', 'projectedAreaCm2'],
      auto: ['annualVolume'],
      part: ['partNumber', 'partName', 'region', 'cavities', 'cycleTimeSec', 'utilization', 'scrapRate'],
      resin: ['partWeightG', 'runnerPct', 'runnerWeightOverride', 'regrindRate', 'resinCostPerKg'],
      machine: ['tonnage', 'machineRateOverride'],
      labor: ['laborRateOverride', 'ohRateOverride', 'secOpsMin', 'operatorsPerMachineOverride'],
      margin: ['marginRateOverride'],
      tooling: ['toolingCost', 'toolLife', 'cumulativeVolume']
    };
    const keys = resetMap[section] || [];
    const patch = {};
    keys.forEach(key => {
      if (TEXT_FIELDS.has(key)) patch[key] = '';
      else patch[key] = DEFAULTS[key] !== undefined ? DEFAULTS[key] : null;
    });
    if (section === 'auto') patch.autoEstimate = false;
    if (section === 'resin') patch.resinBlend = null;
    setState(patch);
  }

  // Resolve regional/computed defaults into override slots so the saved row
  // captures the exact rates used at save time. Fields the user explicitly
  // overrode are left alone.
  function resolveDefaultsForSave(s) {
    const r = REGIONS[s.region] || REGIONS.Mexico;
    const bracket = TONNAGE_BRACKETS.find(b => s.tonnage <= b.maxTons) || TONNAGE_BRACKETS[TONNAGE_BRACKETS.length - 1];
    const blank = v => v === null || v === undefined || v === '';
    const out = { ...s };
    if (blank(out.machineRateOverride)) out.machineRateOverride = +(bracket.baseUSA * r.multiplier).toFixed(4);
    if (blank(out.laborRateOverride))   out.laborRateOverride   = r.laborRate;
    if (blank(out.ohRateOverride))      out.ohRateOverride      = +(r.ohRate * 100).toFixed(2);
    if (blank(out.marginRateOverride))  out.marginRateOverride  = +(r.marginRate * 100).toFixed(2);
    if (blank(out.runnerWeightOverride) && !blank(out.partWeightG) && !blank(out.runnerPct)) {
      out.runnerWeightOverride = +(out.partWeightG * out.runnerPct / 100).toFixed(4);
    }
    return out;
  }

  // Save part to library
  async function handleSave() {
    if (isSaving) return;
    const existing = state.key && savedParts.find(p => p.key === state.key);
    if (existing) {
      const label = (state.partName || state.partNumber || existing.partName || existing.partNumber || 'this part').toString().trim() || 'this part';
      const ok = await showConfirm({
        title: 'Update existing part?',
        message: 'You are about to overwrite the saved version of ' + label + '.',
        confirmLabel: 'Update part',
        cancelLabel: 'Cancel'
      });
      if (!ok) return;
    }
    isSaving = true;
    try {
      const payload = resolveDefaultsForSave(state);
      setState(payload);
      const key = await runServer('savePart', JSON.stringify(payload));
      if (key) state.key = key;
      showToast(existing ? 'Part updated' : 'Part saved');
      await loadPartsList();
      updateSaveButton();
    } catch (e) {
      showToast('Save failed: ' + e.message, 'error');
    } finally {
      isSaving = false;
    }
  }

  // Reflect whether we're editing a saved part on the primary CTA label.
  function updateSaveButton() {
    const btn = document.getElementById('save-btn');
    if (!btn) return;
    const isEditing = state.key && savedParts.some(p => p.key === state.key);
    btn.textContent = isEditing ? 'Update part' : 'Save part to library';
  }

  // In-app confirmation dialog. Returns a Promise<boolean>.
  function showConfirm({ title, message, confirmLabel = 'Confirm', cancelLabel = 'Cancel' }) {
    return new Promise(resolve => {
      const backdrop = document.createElement('div');
      backdrop.className = 'modal-backdrop';
      backdrop.setAttribute('role', 'dialog');
      backdrop.setAttribute('aria-modal', 'true');

      const dialog = document.createElement('div');
      dialog.className = 'modal-dialog';

      const h = document.createElement('h3');
      h.className = 'modal-title';
      h.textContent = title;

      const p = document.createElement('p');
      p.className = 'modal-body';
      p.textContent = message;

      const actions = document.createElement('div');
      actions.className = 'modal-actions';

      const cancelBtn = document.createElement('button');
      cancelBtn.type = 'button';
      cancelBtn.className = 'modal-btn';
      cancelBtn.textContent = cancelLabel;

      const okBtn = document.createElement('button');
      okBtn.type = 'button';
      okBtn.className = 'modal-btn primary';
      okBtn.textContent = confirmLabel;

      actions.append(cancelBtn, okBtn);
      dialog.append(h, p, actions);
      backdrop.append(dialog);

      function close(result) {
        document.removeEventListener('keydown', onKey);
        backdrop.remove();
        resolve(result);
      }
      function onKey(e) {
        if (e.key === 'Escape') close(false);
        else if (e.key === 'Enter') close(true);
      }

      cancelBtn.addEventListener('click', () => close(false));
      okBtn.addEventListener('click', () => close(true));
      backdrop.addEventListener('click', e => { if (e.target === backdrop) close(false); });
      document.addEventListener('keydown', onKey);

      document.body.appendChild(backdrop);
      okBtn.focus();
    });
  }

  // Save the current blend to the Resin Library. Prompts for a name; same key updates in place.
  async function handleSaveBlend() {
    if (isSavingBlend) return;
    const blend = state.resinBlend;
    if (!blend) return;
    const k = computeKBlend(blend);
    if (!(k > 0)) {
      showToast('Blend incomplete — pick at least one resin first', 'error');
      return;
    }
    const suggested = blend.name || suggestBlendName(blend);
    const name = (window.prompt('Name this blend (shown in the resin family dropdown):', suggested) || '').trim();
    if (!name) return;

    const payload = {
      name,
      resins: blend.resins.filter(r => r.resinId && r.weightPct > 0),
      filler: blend.filler && blend.filler.type !== 'none' && blend.filler.pct > 0
        ? { type: blend.filler.type, pct: blend.filler.pct } : { type: 'none', pct: 0 },
      kOverride: blend.kOverride
    };

    isSavingBlend = true;
    try {
      const key = await runServer('saveBlend', JSON.stringify(payload));
      await loadBlendsList();
      // Link the editor's blend to the saved record so re-saving updates the same row.
      setState({ resinBlend: { ...cloneBlend(blend), savedBlendKey: key, name } });
      showToast('Blend saved');
    } catch (e) {
      showToast('Save failed: ' + e.message, 'error');
    } finally {
      isSavingBlend = false;
    }
  }

  // Delete the currently-loaded saved blend from the Resin Library. Composition
  // stays in the editor (just unlinked) so the user doesn't lose their work mid-flow.
  async function handleDeleteBlend() {
    const blend = state.resinBlend;
    if (!blend || !blend.savedBlendKey) return;
    const label = blend.name || 'this blend';
    const ok = await showConfirm({
      title: 'Delete saved blend?',
      message: 'Remove "' + label + '" from the Resin Library. Saved parts that reference it keep their own copy of the composition.',
      confirmLabel: 'Delete blend',
      cancelLabel: 'Cancel'
    });
    if (!ok) return;
    try {
      await runServer('deleteBlend', blend.savedBlendKey);
      await loadBlendsList();
      // Keep the composition in the editor but unlink it from the deleted record.
      setState({ resinBlend: { ...cloneBlend(blend), savedBlendKey: null, name: null } });
      showToast('Blend deleted');
    } catch (e) {
      showToast('Delete failed: ' + e.message, 'error');
    }
  }

  // Fallback name when the user doesn't provide one — e.g. "PC/ABS 60/40 GF30".
  function suggestBlendName(b) {
    const parts = (b.resins || []).filter(r => r.resinId && r.weightPct > 0);
    if (parts.length === 0) return 'Blend';
    const names = parts.map(r => BASE_RESINS[r.resinId] ? BASE_RESINS[r.resinId].name.split(' ')[0] : r.resinId).join('/');
    const ratio = parts.map(r => r.weightPct).join('/');
    const filler = (b.filler && b.filler.type !== 'none' && b.filler.pct > 0)
      ? ' ' + ({ glass: 'GF', talc: 'T', mineral: 'M', caco3: 'C' }[b.filler.type] || '?') + b.filler.pct
      : '';
    return names + ' ' + ratio + filler;
  }

  // Fetch the Resin Library from the server.
  async function loadBlendsList() {
    try {
      const json = await runServer('loadAllBlends');
      savedBlends = JSON.parse(json);
    } catch (e) {
      savedBlends = [];
    }
    populateResinFamilyOptions();
    renderBlendBuilder();
  }

  // Load parts list
  async function loadPartsList() {
    try {
      const json = await runServer('loadAllParts');
      savedParts = JSON.parse(json);
      renderPartsList();
      updateSaveButton();
    } catch (e) {
      console.error('Load failed:', e);
    }
  }

  // Format the "saved by X · 3d ago" suffix for a library row. Falls back gracefully
  // when either field is missing (older rows predate the metadata columns; external
  // Google accounts also return an empty email).
  function formatSavedMeta(part) {
    const who = (part.savedBy || '').trim();
    const when = (part.savedAt || '').trim();
    const parts = [];
    if (who) parts.push(who);
    if (when) {
      const rel = formatRelativeTime(when);
      if (rel) parts.push(rel);
    }
    return parts.length ? 'saved by ' + parts.join(' · ') : '';
  }

  function formatRelativeTime(iso) {
    const t = Date.parse(iso);
    if (!t) return '';
    const diffMs = Date.now() - t;
    const sec = Math.round(diffMs / 1000);
    if (sec < 60) return 'just now';
    const min = Math.round(sec / 60);
    if (min < 60) return min + 'm ago';
    const hr = Math.round(min / 60);
    if (hr < 24) return hr + 'h ago';
    const day = Math.round(hr / 24);
    if (day < 30) return day + 'd ago';
    const mo = Math.round(day / 30);
    if (mo < 12) return mo + 'mo ago';
    return Math.round(mo / 12) + 'y ago';
  }

  // Render parts list — builds DOM nodes (no innerHTML) so saved part names cannot inject HTML/JS.
  // Only shows results matching the search query; empty query = hidden list.
  function renderPartsList() {
    const container = document.getElementById('parts-list');
    const help = document.getElementById('parts-search-help');
    const searchEl = document.getElementById('parts-search');
    const q = (searchEl ? searchEl.value : '').trim().toLowerCase();

    document.getElementById('selected-count').textContent = selectedPartKeys.size;

    container.replaceChildren();

    if (!q) {
      container.style.display = 'none';
      help.textContent = savedParts.length
        ? 'Start typing to search ' + savedParts.length + ' saved part' + (savedParts.length === 1 ? '' : 's') + '.'
        : 'No saved parts yet — save one below to get started.';
      return;
    }

    const matches = savedParts.filter(p =>
      (p.partNumber || '').toLowerCase().includes(q) ||
      (p.partName || '').toLowerCase().includes(q)
    );

    if (matches.length === 0) {
      container.style.display = 'none';
      help.textContent = 'No matches for "' + q + '".';
      return;
    }

    container.style.display = '';
    help.textContent = matches.length + ' match' + (matches.length === 1 ? '' : 'es') + '.';

    matches.forEach(part => {
      const item = document.createElement('div');
      item.className = 'part-item';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = selectedPartKeys.has(part.key);
      cb.addEventListener('change', (e) => togglePartSelection(part.key, e.target.checked));

      const label = document.createElement('label');
      label.className = 'part-item-label';
      label.style.cursor = 'pointer';
      label.addEventListener('click', () => loadPart(part.key));

      const title = document.createElement('span');
      title.textContent = (part.partNumber || 'N/A') + ' - ' + (part.partName || 'Unnamed');
      label.appendChild(title);

      const metaText = formatSavedMeta(part);
      if (metaText) {
        const meta = document.createElement('span');
        meta.className = 'part-item-meta';
        meta.textContent = metaText;
        label.appendChild(meta);
      }

      const del = document.createElement('button');
      del.className = 'part-item-delete';
      del.textContent = 'Delete';
      del.addEventListener('click', () => handleDeletePart(part.key));

      item.append(cb, label, del);
      container.appendChild(item);
    });
  }

  // Load part into editor
  function loadPart(key) {
    const part = savedParts.find(p => p.key === key);
    if (part) {
      state = { ...DEFAULTS, ...part, resinBlend: cloneBlend(part.resinBlend) };
      recalculate();
      renderOutputs();
      renderBlendBuilder();
      updateToolBar();
      updateBadges();
      updateAutoLockUI();
      updateSaveButton();
    }
  }

  // Toggle part selection for export
  function togglePartSelection(key, checked) {
    if (checked) {
      selectedPartKeys.add(key);
    } else {
      selectedPartKeys.delete(key);
    }
    document.getElementById('selected-count').textContent = selectedPartKeys.size;
  }

  // Delete part
  async function handleDeletePart(key) {
    const part = savedParts.find(p => p.key === key);
    const label = part && ((part.partName || part.partNumber || '').toString().trim()) || 'this part';
    const ok = await showConfirm({
      title: 'Delete saved part?',
      message: 'You are about to delete ' + label + ' from the library. This cannot be undone.',
      confirmLabel: 'Delete part',
      cancelLabel: 'Cancel'
    });
    if (!ok) return;
    try {
      await runServer('deletePart', key);
      const wasViewing = state.key === key;
      await loadPartsList();
      if (wasViewing) {
        state = { ...DEFAULTS };
        selectedPartKeys.delete(key);
        recalculate();
        renderOutputs();
        updateToolBar();
        updateBadges();
        updateAutoLockUI();
        updateSaveButton();
      }
      showToast('Part deleted');
    } catch (e) {
      showToast('Delete failed: ' + e.message, 'error');
    }
  }

  // Export selected parts
  async function handleExport() {
    if (selectedPartKeys.size === 0) {
      showToast('Select parts to export', 'error');
      return;
    }
    const selected = savedParts.filter(p => selectedPartKeys.has(p.key));
    try {
      const url = await runServer('exportPartsToSheet', JSON.stringify(selected));
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.click();
      showToast('Export complete. Opening sheet…');
    } catch (e) {
      showToast('Export failed: ' + e.message, 'error');
    }
  }

  // Generate a vendor RFQ template — blank-fill spreadsheet the buyer sends
  // to a quoting vendor. Server-side exportRFQTemplate() does the styling.
  async function handleExportRFQ() {
    if (selectedPartKeys.size === 0) {
      showToast('Select parts first, then click Export for Vendor RFQ', 'error');
      return;
    }
    const selected = savedParts.filter(p => selectedPartKeys.has(p.key));
    try {
      showToast('Building RFQ template…');
      const url = await runServer('exportRFQTemplate', JSON.stringify(selected));
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.click();
      showToast('Vendor RFQ ready — opening sheet…');
    } catch (e) {
      showToast('RFQ export failed: ' + e.message, 'error');
    }
  }

  // New part
  function handleNewPart() {
    state = { ...DEFAULTS };
    selectedPartKeys.clear();
    recalculate();
    renderOutputs();
    renderBlendBuilder();
    updateToolBar();
    updateBadges();
    updateAutoLockUI();
    updateSaveButton();
    showToast('New part started');
  }

  // Show toast notification
  function showToast(msg, type = 'success') {
    const toast = document.createElement('div');
    toast.className = 'toast' + (type === 'error' ? ' error' : '');
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // Whitelist of state keys that JSON import is allowed to set. Anything else
  // in the payload (including the _meta block) is ignored so a malformed or
  // tampered JSON can't write to fields it shouldn't.
  const IMPORT_ALLOWED_KEYS = new Set([
    'partNumber', 'partName', 'region', 'comparisonMode',
    'partVolumeCm3', 'partWeightG', 'wallThicknessMm', 'projectedAreaCm2',
    'resinCostPerKg', 'runnerPct', 'regrindRate', 'scrapRate',
    'annualVolume', 'projAreaClampCoeff',
    'autoEstimate', 'toolingCost', 'toolLife', 'cumulativeVolume',
    'resinBlend',
    // Allow these in case the script outputs supplier-specific overrides:
    'cavities', 'cycleTimeSec', 'tonnage', 'utilization',
    'machineRateOverride', 'laborRateOverride', 'ohRateOverride', 'marginRateOverride',
    'secOpsMin', 'operatorsPerMachineOverride'
  ]);

  function applyImportedPayload(payload) {
    if (!payload || typeof payload !== 'object') {
      showToast('Invalid JSON — must be an object', 'error');
      return;
    }
    const patch = {};
    let applied = 0;
    Object.keys(payload).forEach(key => {
      if (!IMPORT_ALLOWED_KEYS.has(key)) return;
      patch[key] = payload[key];
      applied++;
    });
    if (applied === 0) {
      showToast('No importable fields found in JSON', 'error');
      return;
    }
    // Clear the saved-part key so the import becomes a "new part" until saved.
    patch.key = null;
    setState(patch);
    const label = payload.partName || payload.partNumber || 'part';
    showToast('Imported ' + applied + ' fields for ' + label);
  }

  // ============================================================================
  // STEP file parsing (in-browser via occt-import-js / OpenCascade WASM)
  // ============================================================================

  // Pinned to a specific version so the SRI hash stays valid. To upgrade, run:
  //   curl -sL https://cdn.jsdelivr.net/npm/occt-import-js@<ver>/dist/occt-import-js.js | openssl dgst -sha384 -binary | openssl base64 -A
  // and update OCCT_JS_URL + OCCT_JS_SRI together.
  const OCCT_JS_URL = 'https://cdn.jsdelivr.net/npm/occt-import-js@0.0.22/dist/occt-import-js.js';
  const OCCT_JS_SRI = 'sha384-D09rZmw+e2oaqc2DV1M8zymgctW7c8vSC3q3Mpd8TY05uTOCuyciSdbkYHtmK3KZ';
  let _occtInstance = null;
  let _occtLoadingPromise = null;

  // Lazy-load the OpenCascade WASM module. STEP files never leave the browser;
  // jsdelivr only serves the library bytes once (then cached by the browser).
  async function loadOcct() {
    if (_occtInstance) return _occtInstance;
    if (_occtLoadingPromise) return _occtLoadingPromise;
    _occtLoadingPromise = (async () => {
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = OCCT_JS_URL;
        s.integrity = OCCT_JS_SRI;
        s.crossOrigin = 'anonymous';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Failed to load STEP parser (CDN unreachable or blocked)'));
        document.head.appendChild(s);
      });
      if (typeof window.occtimportjs !== 'function') {
        throw new Error('STEP parser loaded but global occtimportjs not found');
      }
      _occtInstance = await window.occtimportjs();
      return _occtInstance;
    })();
    return _occtLoadingPromise;
  }

  // ============================================================================
  // Three.js viewer — lazy-loaded after first successful STEP parse so the
  // ~600KB library only downloads when needed. Same CDN as occt-import-js;
  // SRI-pinned for integrity.
  // ============================================================================
  const THREE_JS_URL  = 'https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js';
  const THREE_JS_SRI  = 'sha384-vV17nr/rMaJqmeZkFUzXLpHdQ+ME5QHKdydaqqN+3Ga39RJlNrTatJxHwGV4ml2C';
  const ORBIT_JS_URL  = 'https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js';
  const ORBIT_JS_SRI  = 'sha384-I0DMsfimAPIqWT8lF+oA997gRgdUi3jhidoTq3fN0zmn35smXZukD01FLnsPRU9i';
  let _threeLoadingPromise = null;
  let viewerState = null;  // { scene, camera, renderer, controls, partGroup, raf }

  async function loadThree() {
    if (window.THREE && window.THREE.OrbitControls) return window.THREE;
    if (_threeLoadingPromise) return _threeLoadingPromise;
    _threeLoadingPromise = (async () => {
      // Load Three.js core
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = THREE_JS_URL;
        s.integrity = THREE_JS_SRI;
        s.crossOrigin = 'anonymous';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Failed to load Three.js'));
        document.head.appendChild(s);
      });
      // Load OrbitControls (depends on THREE global)
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = ORBIT_JS_URL;
        s.integrity = ORBIT_JS_SRI;
        s.crossOrigin = 'anonymous';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Failed to load OrbitControls'));
        document.head.appendChild(s);
      });
      return window.THREE;
    })();
    return _threeLoadingPromise;
  }

  // Initialize the renderer + scene once. Subsequent parses reuse the same
  // scene and just swap the part geometry.
  function init3DViewer(container) {
    const THREE = window.THREE;
    // CAD convention: Z axis up. Three.js default is Y up; setting DefaultUp
    // BEFORE any cameras / controls are created flips that convention.
    THREE.Object3D.DefaultUp.set(0, 0, 1);

    const w = container.clientWidth || 400;
    const h = 320;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf7f7f5);

    const camera = new THREE.PerspectiveCamera(40, w / h, 0.1, 100000);
    camera.up.set(0, 0, 1);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(w, h);
    renderer.setPixelRatio(window.devicePixelRatio || 1);
    container.appendChild(renderer.domElement);

    // Lighting — ambient + two directional for shape readability.
    scene.add(new THREE.AmbientLight(0xffffff, 0.55));
    const key = new THREE.DirectionalLight(0xffffff, 0.7);
    key.position.set(1, 1, 1);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0xffffff, 0.35);
    fill.position.set(-1, -1, -0.5);
    scene.add(fill);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;
    // Screen-space panning: right-drag moves the orbit target along the
    // camera's local plane — intuitive for inspecting part regions.
    controls.screenSpacePanning = true;
    // Scroll wheel zooms toward the cursor position, not the orbit center.
    // Lets users pinpoint a feature by hovering over it before scrolling in.
    controls.zoomToCursor = true;

    function animate() {
      viewerState.raf = requestAnimationFrame(animate);
      controls.update();
      updateMeasureLabelPosition();
      renderer.render(scene, camera);
    }

    // Resize observer keeps the canvas matched to its container width when
    // the right-panel layout reflows.
    const onResize = () => {
      const w = container.clientWidth || 400;
      renderer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    };
    window.addEventListener('resize', onResize);

    viewerState = { scene, camera, renderer, controls, partGroup: null, raf: null, onResize, initialView: null };
    animate();
    attachViewerClickHandler();
  }

  // Build BufferGeometry for each occt-import-js mesh, wrap in a group with
  // a Base-green material, and frame the camera to the bbox.
  function display3DPart(meshes) {
    const THREE = window.THREE;
    if (!viewerState) return;

    // Loading a new part invalidates any previous measurements.
    clearMeasurementGeometry();

    // Remove the previous part if there is one.
    if (viewerState.partGroup) {
      viewerState.scene.remove(viewerState.partGroup);
      viewerState.partGroup.traverse(obj => {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) obj.material.dispose();
      });
    }

    const partGroup = new THREE.Group();
    meshes.forEach(m => {
      const verts = m.attributes && m.attributes.position && m.attributes.position.array;
      const idx = m.index && m.index.array;
      if (!verts || !idx) return;
      const geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(new Float32Array(verts), 3));
      geom.setIndex(new THREE.BufferAttribute(new Uint32Array(idx), 1));
      geom.computeVertexNormals();
      const material = new THREE.MeshStandardMaterial({
        color: 0x1E4D2B,         // Base Power green
        metalness: 0.15,
        roughness: 0.55,
        side: THREE.DoubleSide
      });
      partGroup.add(new THREE.Mesh(geom, material));
    });
    viewerState.scene.add(partGroup);
    viewerState.partGroup = partGroup;

    // Frame the camera to the bbox so the part fills the view comfortably.
    const bbox = new THREE.Box3().setFromObject(partGroup);
    const center = bbox.getCenter(new THREE.Vector3());
    const size = bbox.getSize(new THREE.Vector3()).length();
    const fov = viewerState.camera.fov * Math.PI / 180;
    const fitDist = (size / 2) / Math.tan(fov / 2) * 1.4;  // 1.4 for margin
    // Position camera looking at the front-right-top of the bbox.
    const dir = new THREE.Vector3(1, -1, 0.6).normalize();
    viewerState.camera.position.copy(center).add(dir.multiplyScalar(fitDist));
    viewerState.camera.near = Math.max(0.1, size / 200);
    viewerState.camera.far  = size * 200;
    viewerState.camera.updateProjectionMatrix();
    viewerState.controls.target.copy(center);
    viewerState.controls.update();

    // Remember the framing so 'Reset view' can restore it.
    viewerState.initialView = {
      position: viewerState.camera.position.clone(),
      target: center.clone()
    };
  }

  // Reset view button — restore the camera to its initial framing.
  window.resetViewerCamera = function () {
    if (!viewerState || !viewerState.initialView) return;
    viewerState.camera.position.copy(viewerState.initialView.position);
    viewerState.controls.target.copy(viewerState.initialView.target);
    viewerState.controls.update();
  };

  // ============================================================================
  // Measurement tool — click two points on the part to measure straight-line
  // distance. Raycaster picks the surface point; markers + line are drawn in
  // 3D, the distance label is an HTML overlay projected back to 2D each frame.
  // ============================================================================
  let measureState = {
    active: false,
    points: [],          // array of THREE.Vector3 picked on the surface
    markers: [],         // sphere meshes for each picked point
    line: null,          // line connecting the two points
    raycaster: null,
    clickHandler: null
  };

  function clearMeasurementGeometry() {
    if (!viewerState) return;
    measureState.markers.forEach(m => {
      viewerState.scene.remove(m);
      m.geometry.dispose();
      m.material.dispose();
    });
    measureState.markers = [];
    if (measureState.line) {
      viewerState.scene.remove(measureState.line);
      measureState.line.geometry.dispose();
      measureState.line.material.dispose();
      measureState.line = null;
    }
    measureState.points = [];
    const label = document.getElementById('viewer-measure-label');
    if (label) label.hidden = true;
  }

  window.clearMeasurements = function () {
    clearMeasurementGeometry();
  };

  window.toggleMeasureMode = function () {
    measureState.active = !measureState.active;
    const btn = document.getElementById('viewer-measure-btn');
    const canvas = document.getElementById('step-viewer-canvas');
    const hint = document.getElementById('viewer-measure-hint');
    if (btn) btn.classList.toggle('active', measureState.active);
    if (canvas) canvas.classList.toggle('measuring', measureState.active);
    if (hint) hint.hidden = !measureState.active;
    if (measureState.active) {
      // Starting a fresh measurement: clear previous markers.
      clearMeasurementGeometry();
    }
  };

  // Place a measurement point at the picked surface position. After the
  // second point is placed, draws the line + distance label and exits
  // measure mode (so the next click doesn't immediately start a third).
  function placeMeasurePoint(point) {
    const THREE = window.THREE;
    if (!viewerState) return;

    // Marker (small sphere). Size scales with the part's bbox so it's visible
    // on tiny parts and not obscuring the surface on big ones. Smaller than
    // v42 (was bbox/80) so the pick point is precise.
    const partBox = new THREE.Box3().setFromObject(viewerState.partGroup);
    const partSize = partBox.getSize(new THREE.Vector3()).length();
    const markerRadius = Math.max(0.15, partSize / 200);
    const markerGeom = new THREE.SphereGeometry(markerRadius, 16, 10);
    const markerMat = new THREE.MeshBasicMaterial({ color: 0xED6C30, depthTest: false });
