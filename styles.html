<style>
    :root {
      /* Base brand palette */
      --grounded: #1E4D2B;
      --green-100: #102A17;
      --green-60: #77A45A;
      --green-20: #B2DD79;
      --green-5: #D6F0B4;
      --conduit: #F0EEEB;
      --terminal: #292826;
      --strike: #FFFFFF;
      --energy: #ED6C30;
      --energy-90: #742C0B;
      --energy-5: #FBE3D8;
      --yellow-80: #5E4507;
      --yellow-60: #AA8422;
      --yellow-20: #F7C33C;
      --yellow-5: #FDF1D3;
      --blue-60: #048EE5;
      --grey-80: #54524F;
      --grey-60: #7F7D7A;
      --grey-40: #A9A8A7;
      --grey-20: #D8D7D5;
      --grey-10: #ECEAE6;

      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --shadow-sm: 0 1px 2px rgba(41, 40, 38, 0.05), 0 1px 3px rgba(41, 40, 38, 0.04);
      --shadow-md: 0 4px 12px rgba(41, 40, 38, 0.06), 0 2px 4px rgba(41, 40, 38, 0.04);
      --shadow-lg: 0 18px 40px -12px rgba(16, 42, 23, 0.28), 0 4px 12px rgba(41, 40, 38, 0.06);
      --ring-grounded: 0 0 0 3px rgba(30, 77, 43, 0.14);
      --ring-energy: 0 0 0 3px rgba(237, 108, 48, 0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--conduit);
      color: var(--terminal);
      line-height: 1.5;
      font-weight: 500;
      font-size: 14px;
      letter-spacing: -0.005em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app-wrap {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #header-bar {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--strike);
      border-bottom: 1px solid var(--grey-20);
      padding: 0 28px;
      height: 64px;
      flex: 0 0 64px;
      box-shadow: 0 1px 0 rgba(16, 42, 23, 0.04);
    }

    #header-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--grounded);
    }

    #header-bar::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 64px;
      height: 4px;
      background: var(--energy);
    }

    #header-logo {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--green-5);
      border-radius: var(--radius-sm);
      padding: 4px;
    }

    #header-logo svg { width: 100%; height: 100%; display: block; }

    #header-titles {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    #header-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--grounded);
    }

    #header-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--terminal);
      letter-spacing: -0.01em;
    }

    #header-meta {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey-60);
    }

    #header-meta .pulse {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green-60);
      box-shadow: 0 0 0 0 rgba(119, 164, 90, 0.6);
      animation: pulse 2.4s ease-out infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(119, 164, 90, 0.5); }
      70% { box-shadow: 0 0 0 8px rgba(119, 164, 90, 0); }
      100% { box-shadow: 0 0 0 0 rgba(119, 164, 90, 0); }
    }

    #app {
      display: flex;
      flex: 1;
      min-height: 0;
      gap: 0;
    }

    #left-panel {
      flex: 0 0 46%;
      background: var(--strike);
      overflow-y: auto;
      border-right: 1px solid var(--grey-20);
      padding: 24px 24px 36px;
    }

    #right-panel {
      flex: 1;
      background: var(--conduit);
      overflow-y: auto;
      padding: 32px 36px 48px;
    }

    .section {
      margin-bottom: 18px;
      border-radius: var(--radius-md);
      background: var(--strike);
      border: 1px solid var(--grey-20);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 180ms ease, border-color 180ms ease;
      position: relative;
    }

    .section:hover { box-shadow: var(--shadow-md); }

    .section-header {
      background: var(--grey-10);
      color: var(--grey-80);
      padding: 11px 14px 10px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--grey-10);
      gap: 12px;
    }

    .section-header-label {
      display: inline-flex;
      align-items: center;
      gap: 9px;
    }

    .section-header-label::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--grounded);
      box-shadow: 0 0 0 3px var(--green-5);
      flex: 0 0 7px;
    }

    .section-body {
      background: var(--strike);
      padding: 16px 16px 18px 18px;
    }

    .input-row {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
      align-items: flex-start;
    }

    .input-row:last-child { margin-bottom: 0; }

    .input-group { flex: 1; min-width: 0; }

    .input-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--terminal);
      margin-bottom: 6px;
      display: block;
    }

    .input-help {
      font-size: 11px;
      color: var(--grey-60);
      font-weight: 500;
      line-height: 1.4;
      display: block;
      margin: 6px 0 0;
    }

    .input-field {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--grey-20);
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      color: var(--terminal);
      background: var(--strike);
      transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    .input-field:hover { border-color: var(--grey-40); }

    .input-field::placeholder { color: var(--grey-40); font-weight: 400; }

    .input-field:focus {
      outline: none;
      border-color: var(--grounded);
      box-shadow: var(--ring-grounded);
    }

    .input-field.locked {
      background: var(--green-5);
      border-color: rgba(30, 77, 43, 0.18);
      color: var(--grounded);
      cursor: not-allowed;
    }

    .input-field.locked:hover { border-color: rgba(30, 77, 43, 0.18); }
    .input-field.locked:focus { box-shadow: none; border-color: rgba(30, 77, 43, 0.18); }

    .auto-badge {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      background: var(--green-5);
      color: var(--grounded);
      border: 1px solid rgba(30, 77, 43, 0.18);
      border-radius: 999px;
      vertical-align: middle;
    }

    .toggle-row {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-row input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .toggle-track {
      position: relative;
      width: 34px;
      height: 20px;
      background: var(--grey-20);
      border-radius: 999px;
      transition: background 120ms ease;
      flex: 0 0 auto;
    }

    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: var(--strike);
      border-radius: 999px;
      box-shadow: var(--shadow-sm);
      transition: transform 140ms ease;
    }

    .toggle-row input:checked ~ .toggle-track { background: var(--grounded); }
    .toggle-row input:checked ~ .toggle-track .toggle-thumb { transform: translateX(14px); }
    .toggle-row input:focus-visible ~ .toggle-track { box-shadow: var(--ring-grounded); }

    .toggle-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--terminal);
    }

    .override-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      padding: 4px 10px 4px 8px;
      border-radius: 999px;
      margin-top: 10px;
      font-weight: 600;
      letter-spacing: 0.01em;
      border: 1px solid transparent;
    }

    .override-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.7;
    }

    .override-badge.default {
      background: var(--green-5);
      color: var(--grounded);
      border-color: rgba(30, 77, 43, 0.12);
    }

    .override-badge.override {
      background: var(--yellow-5);
      color: var(--yellow-80);
      border-color: rgba(170, 132, 34, 0.28);
    }

    button {
      padding: 9px 14px;
      background: var(--grounded);
      color: var(--strike);
      border: 1px solid var(--grounded);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.005em;
      transition: background 120ms ease, border-color 120ms ease, transform 80ms ease;
    }

    button:hover { background: var(--green-100); border-color: var(--green-100); }
    button:active { transform: translateY(1px); }

    button.secondary {
      background: var(--strike);
      color: var(--terminal);
      border: 1px solid var(--grey-20);
    }

    button.secondary:hover {
      background: var(--conduit);
      border-color: var(--grey-40);
    }

    button.delete {
      background: var(--energy);
      border-color: var(--energy);
    }
    button.delete:hover { background: var(--energy-90); border-color: var(--energy-90); }

    .reset-btn {
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      color: var(--grey-60);
      border: 1px solid var(--grey-20);
      border-radius: var(--radius-sm);
    }

    .reset-btn:hover {
      background: var(--strike);
      color: var(--grounded);
      border-color: var(--green-60);
    }

    .primary-cta {
      width: 100%;
      margin-top: 24px;
      padding: 14px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: var(--energy);
      border-color: var(--energy);
      color: var(--strike);
      box-shadow: 0 6px 18px -8px rgba(237, 108, 48, 0.55), 0 1px 2px rgba(116, 44, 11, 0.18);
    }

    .primary-cta:hover {
      background: var(--energy-90);
      border-color: var(--energy-90);
      box-shadow: 0 8px 20px -8px rgba(116, 44, 11, 0.65), 0 1px 2px rgba(116, 44, 11, 0.2);
    }

    .primary-cta:focus-visible {
      outline: none;
      box-shadow: var(--ring-energy), 0 6px 18px -8px rgba(237, 108, 48, 0.55);
    }

    .panel-eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--grey-60);
      margin-bottom: 6px;
    }

    .panel-heading {
      font-size: 24px;
      font-weight: 600;
      color: var(--terminal);
      margin: 0 0 24px;
      letter-spacing: -0.02em;
    }

    .panel-subheading {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-60);
      margin: 28px 0 12px;
    }

    #summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 8px;
    }

    .summary-card {
      background: var(--strike);
      padding: 16px 16px 14px;
      border-radius: var(--radius-md);
      border: 1px solid var(--grey-20);
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
      transition: box-shadow 180ms ease, transform 180ms ease;
    }

    .summary-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--grey-20);
    }

    .summary-card:hover {
      box-shadow: var(--shadow-md);
    }

    .summary-card.highlight {
      background: var(--grounded);
      color: var(--strike);
      grid-column: 1 / -1;
      border-color: var(--grounded);
      padding: 24px 26px;
      box-shadow: var(--shadow-lg);
    }

    .summary-card.highlight::before {
      height: 3px;
      background: var(--energy);
    }

    .summary-card.highlight .card-label {
      color: rgba(255, 255, 255, 0.78);
      letter-spacing: 0.18em;
    }

    .summary-card.highlight .card-value {
      color: var(--strike);
      font-size: 40px;
      line-height: 1.05;
      margin-top: 2px;
    }

    .summary-card.highlight .card-unit {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.72);
      margin-left: 6px;
      letter-spacing: 0;
    }

    .card-label {
      font-size: 10px;
      color: var(--grey-60);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .card-value {
      font-size: 20px;
      font-weight: 600;
      color: var(--terminal);
      font-feature-settings: 'tnum';
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .card-unit {
      font-size: 11px;
      font-weight: 500;
      color: var(--grey-60);
      margin-left: 4px;
      letter-spacing: 0;
    }

    #output-table {
      background: var(--strike);
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--grey-20);
      box-shadow: var(--shadow-sm);
    }

    .output-row {
      display: grid;
      grid-template-columns: 220px 1fr;
      border-bottom: 1px solid var(--grey-10);
      transition: background 100ms ease;
    }

    .output-row:last-child { border-bottom: none; }
    .output-row:hover { background: var(--green-5); }

    .output-row.is-total {
      background: var(--green-5);
      border-bottom: 1px solid var(--grey-20);
    }

    .output-row.is-total .output-label {
      color: var(--grounded);
      font-weight: 700;
    }

    .output-row.is-total .output-value {
      color: var(--grounded);
      font-weight: 700;
      font-size: 14px;
    }

    .output-label {
      padding: 11px 16px;
      font-weight: 600;
      font-size: 12px;
      color: var(--grey-80);
      letter-spacing: -0.005em;
    }

    .output-value {
      padding: 11px 16px;
      font-size: 13px;
      font-feature-settings: 'tnum';
      color: var(--terminal);
      font-weight: 500;
      border-left: 1px solid var(--grey-10);
    }

    .formula-toggle {
      background: none;
      border: 0;
      cursor: pointer;
      font-size: 12px;
      color: var(--grey-60);
      padding: 0 4px;
      margin-left: 6px;
      line-height: 1;
      border-radius: 3px;
      transition: color 100ms ease, background 100ms ease;
    }
    .formula-toggle:hover { color: var(--grounded); background: var(--green-5); }
    .formula-toggle[aria-expanded="true"] { color: var(--grounded); background: var(--green-5); }

    .formula-inline {
      background: var(--green-5);
      padding: 12px 16px 14px;
      font-size: 12px;
      color: var(--grey-80);
      border-bottom: 1px solid var(--grey-10);
    }
    .formula-inline[hidden] { display: none; }
    .formula-inline .note {
      display: block;
      margin-top: 8px;
      line-height: 1.5;
    }
    .formula-inline .note var {
      font-style: italic;
      color: var(--grounded);
      font-weight: 600;
      background: rgba(30, 77, 43, 0.08);
      padding: 0 5px;
      border-radius: 3px;
      font-size: 11px;
    }
    .formula-inline a {
      color: var(--grounded);
      text-decoration: underline;
      text-underline-offset: 2px;
      font-weight: 600;
    }

    /* Graphical formula display — replaces monospace code blocks */
    .formula-display {
      background: var(--strike);
      border: 1px solid var(--grey-20);
      border-left: 3px solid var(--green-60);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--terminal);
      line-height: 1.95;
      letter-spacing: 0.005em;
      font-feature-settings: 'tnum', 'ss01';
    }
    .formula-display .formula-line {
      display: block;
      white-space: nowrap;
      overflow-x: auto;
      padding: 1px 0;
    }
    .formula-display .formula-line + .formula-line {
      border-top: 1px dashed var(--grey-10);
      margin-top: 4px;
      padding-top: 5px;
    }
    .formula-display var {
      font-style: italic;
      font-weight: 600;
      color: var(--grounded);
      font-family: 'Cambria', 'Georgia', 'Times New Roman', serif;
      letter-spacing: 0;
      padding: 0 1px;
    }
    .formula-display .op {
      color: var(--grey-60);
      font-weight: 500;
      margin: 0 4px;
    }
    .formula-display .eq {
      color: var(--energy-90);
      font-weight: 700;
      margin: 0 8px;
    }
    .formula-display .num {
      color: var(--terminal);
      font-weight: 600;
    }
    .formula-display .paren {
      color: var(--grey-60);
      font-weight: 400;
    }
    .formula-display .cond {
      color: var(--grey-60);
      font-style: italic;
      font-size: 11px;
      margin-left: 6px;
    }
    .formula-display .frac {
      display: inline-flex;
      flex-direction: column;
      vertical-align: middle;
      text-align: center;
      margin: 0 4px;
      font-size: 11.5px;
      line-height: 1.1;
    }
    .formula-display .frac > .num-top {
      border-bottom: 1.5px solid var(--terminal);
      padding: 0 6px 2px;
    }
    .formula-display .frac > .num-bot {
      padding: 2px 6px 0;
    }
    .formula-display .prop {
      font-style: italic;
      font-weight: 600;
      color: var(--grounded);
      font-family: 'Cambria', 'Georgia', 'Times New Roman', serif;
      letter-spacing: 0;
    }
    .formula-display .prop .dot {
      color: var(--grey-40);
      font-weight: 400;
      margin: 0 1px;
    }
    .formula-display .piecewise {
      display: inline-flex;
      align-items: stretch;
      vertical-align: middle;
      margin: 2px 4px;
    }
    .formula-display .piecewise .brace {
      display: inline-flex;
      align-items: center;
      font-size: 28px;
      font-weight: 300;
      color: var(--grey-60);
      line-height: 1;
      padding-right: 8px;
      transform: scaleY(1.4);
    }
    .formula-display .piecewise .cases {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      font-size: 12px;
      line-height: 1.3;
    }
    .formula-display .piecewise .case-row {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .formula-display .piecewise .case-when {
      color: var(--grey-60);
      font-style: italic;
      font-size: 11px;
    }
    .formula-display .formula-line.indent { padding-left: 18px; }
    .formula-display .else-eq {
      color: var(--energy-90);
      font-weight: 700;
      display: inline-block;
      width: 16px;
      text-align: right;
      margin-right: 4px;
    }

    /* Region constants table — replaces tabular code block */
    .constants-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--strike);
      border: 1px solid var(--grey-20);
      border-left: 3px solid var(--green-60);
      border-radius: var(--radius-sm);
      overflow: hidden;
      font-size: 12px;
      font-feature-settings: 'tnum';
      margin-bottom: 10px;
    }
    .constants-table thead th {
      background: var(--green-5);
      color: var(--grounded);
      font-weight: 700;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 8px 10px;
      text-align: right;
      border-bottom: 1px solid var(--grey-20);
    }
    .constants-table thead th:first-child {
      text-align: left;
    }
    .constants-table tbody td {
      padding: 7px 10px;
      text-align: right;
      color: var(--terminal);
      border-bottom: 1px solid var(--grey-10);
    }
    .constants-table tbody tr:last-child td { border-bottom: none; }
    .constants-table tbody td:first-child {
      text-align: left;
      font-weight: 600;
      color: var(--grounded);
      font-family: 'Cambria', 'Georgia', serif;
      font-style: italic;
    }

    .methodology {
      margin-top: 20px;
      background: var(--strike);
      border: 1px solid var(--grey-20);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .methodology > summary {
      cursor: pointer;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 13px;
      color: var(--grounded);
      list-style: none;
      user-select: none;
      background: var(--green-5);
